                <button key={b.k} onClick={() => b.locked ? onRequireLogin(b.l) : null} className="try-qa-btn" style={{
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 8, padding: "16px 8px",
                  background: "linear-gradient(145deg,rgba(91,75,138,0.2),rgba(139,131,168,0.1))",
                  border: `1px solid ${b.locked ? "rgba(139,131,168,0.18)" : "rgba(139,131,168,0.35)"}`,
                  borderRadius: 16,
                  boxShadow: "0 4px 14px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05)",
                  cursor: "pointer", position: "relative",
                }}>
                  <div style={{ width: 40, height: 40, borderRadius: 13, background: "linear-gradient(135deg,#5B4B8A,#8B83A8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, boxShadow: "0 4px 14px rgba(139,131,168,0.35),inset 0 1px 0 rgba(255,255,255,0.12)" }}>{b.i}</div>
                  <span style={{ fontSize: 11, color: "#C5C0D8", fontWeight: 600, textAlign: "center", lineHeight: 1.3 }}>{b.l}</span>
                  {b.locked && <span style={{ position: "absolute", top: 6, right: 7, fontSize: 9, background: "rgba(0,0,0,0.6)", borderRadius: 6, padding: "1px 4px", color: "#8B83A8" }}>🔒</span>}
                </button>
              ))}
            </div>
          </div>

          {/* Recent Activity */}
          <div style={{ borderRadius: 20, padding: "18px", background: "linear-gradient(135deg,rgba(16,16,28,0.95),rgba(14,14,22,0.98))", border: "1px solid rgba(139,131,168,0.15)", boxShadow: "0 4px 24px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.03)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <p style={{ fontSize: 14, fontWeight: 700, color: "#F0ECF9", margin: 0 }}>Recent Activity</p>
                <span style={{ fontSize: 10, background: "rgba(245,158,11,0.15)", border: "1px solid rgba(245,158,11,0.3)", color: "#f59e0b", padding: "2px 8px", borderRadius: 20, fontWeight: 700 }}>Preview</span>
              </div>
              <button onClick={() => onRequireLogin("History")} style={{ fontSize: 12, color: "#8B83A8", background: "rgba(139,131,168,0.1)", border: "1px solid rgba(139,131,168,0.2)", borderRadius: 20, padding: "4px 12px", fontWeight: 600, cursor: "pointer" }}>View All →</button>
            </div>
            {demoReqs.map((r, i) => (
              <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 13px", background: "rgba(139,131,168,0.06)", borderRadius: 13, marginBottom: 8, border: "1px solid rgba(139,131,168,0.08)", animation: `slideUp 0.4s ${0.08 * i}s both ease` }}>
                <div style={{ width: 38, height: 38, borderRadius: 11, background: "linear-gradient(135deg,#5B4B8A,#8B83A8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0, boxShadow: "0 3px 10px rgba(139,131,168,0.3)" }}>{SVC_ICO[r.service_type] || "◆"}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ fontSize: 13, fontWeight: 600, color: "#F0ECF9", margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.service_type} — {r.description}</p>
                  <p style={{ fontSize: 11, color: "#8B83A8", margin: "2px 0 0" }}>{r.created_at}</p>
                </div>
                <Badge s={r.status} />
              </div>
            ))}
            <div style={{ marginTop: 10, padding: "14px", background: "rgba(245,158,11,0.06)", border: "1px dashed rgba(245,158,11,0.25)", borderRadius: 12, textAlign: "center" }}>
              <p style={{ fontSize: 13, color: "#d4a574", margin: "0 0 10px", fontWeight: 600 }}>🔒 Sign in to see your real service history</p>
              <button onClick={() => onRequireLogin("History")} style={{ padding: "8px 22px", borderRadius: 20, border: "1px solid rgba(139,131,168,0.4)", background: "linear-gradient(135deg,rgba(91,75,138,0.3),rgba(139,131,168,0.15))", color: "#C5C0D8", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Sign In to Continue →</button>
            </div>
          </div>
        </div>
      );
    }


    /* ══════════════════════════════════════
       TRY MODE — LOGIN GATE MODAL
       Shown when user tries to take an action
       while in try/preview mode
    ══════════════════════════════════════ */
    function TryLoginGate({ onClose, onLogin }) {
      const [mode, setMode] = useState("login");
      const [flipping, setFlipping] = useState(false);
      const [otpStep, setOtpStep] = useState(false);
      const [pendingUserId, setPendingUserId] = useState(null);
      const [loginOtp, setLoginOtp] = useState("");
      const [devOtp, setDevOtp] = useState("");
      const [signupOtpStep, setSignupOtpStep] = useState(false);
      const [signupSessionKey, setSignupSessionKey] = useState(null);
      const [resendCooldown, setResendCooldown] = useState(0);
      const startCooldown = () => { setResendCooldown(30); const t = setInterval(() => setResendCooldown(p => { if (p <= 1) { clearInterval(t); return 0; } return p - 1; }), 1000); };
      const [signupOtp, setSignupOtp] = useState("");
      const [signupDevOtp, setSignupDevOtp] = useState("");
      const [f, setF] = useState({ name: "", email: "", pass: "", phone: "", role: "customer", skill: "", society: "Shapoorji Complex, New Town", exp: "" });
      const sv = (k, v) => setF(p => ({ ...p, [k]: v }));
      const [err, setErr] = useState("");
      const [load, setLoad] = useState(false);
      const [showForgot, setShowForgot] = useState(false);

      const switchMode = (newMode) => {
        if (newMode === mode || flipping) return;
        setFlipping(true);
        setTimeout(() => { setMode(newMode); setErr(""); }, 280);
        setTimeout(() => setFlipping(false), 560);
      };

      const IS = {
        width: "100%", padding: "11px 14px", borderRadius: 11,
        border: "1px solid rgba(139,131,168,0.2)",
        background: "rgba(20,14,6,0.7)",
        color: "#F0ECF9", fontSize: 14, boxSizing: "border-box", fontFamily: "inherit",
        transition: "border-color 0.2s", outline: "none", marginBottom: 2,
      };

      const t2 = { border: "rgba(139,131,168,0.2)", inp: "rgba(20,14,6,0.7)", txt: "#F0ECF9", muted: "#8B83A8" };

      const validate = () => {
        if (mode === "login") {
          if (!f.email) return "Email is required.";
          if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(f.email)) return "Enter a valid email.";
          if (!f.pass) return "Password is required.";
          return null;
        }
        if (!f.name.trim()) return "Full name is required.";
        if (!f.email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(f.email)) return "Enter a valid email.";
        if (!f.pass || f.pass.length < 6) return "Password must be at least 6 characters.";
        if (!f.phone || f.phone.replace(/\D/g, "").length < 10) return "Enter a valid 10-digit phone.";
        if (!f.society) return "Please select your society.";
        return null;
      };

      const submit = async () => {
        const e = validate();
        if (e) { setErr(e); return; }
        setLoad(true); setErr("");
        try {
          if (mode === "login") {
            const r = await API.login(f.email, f.pass);
            if (r.otp_required) {
              setPendingUserId(r.user_id);
              if (r.otp) {
                const sent = await sendLoginOtpEmail(f.email, r.otp);
                if (!sent) setDevOtp(r.otp); // only show on screen if email fails
              }
              setOtpStep(true);
            } else {
              localStorage.setItem("sc_token", r.token);
              onLogin(r.user);
            }
          } else {
            const generatedOtp = String(Math.floor(100000 + Math.random() * 900000));
            const svcId = window.EMAILJS_SERVICE_ID;
            const tplId = window.EMAILJS_TEMPLATE_ID;
            const pubKey = window.EMAILJS_PUBLIC_KEY;
            const ejsConfigured = svcId !== "YOUR_SERVICE_ID" && tplId !== "YOUR_TEMPLATE_ID" && pubKey !== "YOUR_PUBLIC_KEY";
            if (ejsConfigured) {
              try {
                await emailjs.send(svcId, tplId, { to_email: f.email, to_name: f.name, otp_code: generatedOtp, app_name: "SocietyConnect" }, pubKey);
                setSignupDevOtp("");
              } catch { setSignupDevOtp(generatedOtp); }
            } else { setSignupDevOtp(generatedOtp); }
            setSignupSessionKey(generatedOtp);
            setSignupOtpStep(true);
          }
        } catch (e) { setErr(e.message); }
        setLoad(false);
      };

      const OtpBoxesGate = ({ otp, setOtp, prefix, onComplete }) => {
        const handlePaste = (e) => {
          e.preventDefault();
          const pasted = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);
          if (pasted.length > 0) {
            setOtp(pasted);
            const nextIdx = Math.min(pasted.length, 5);
            setTimeout(() => document.getElementById(`${prefix}${nextIdx}`)?.focus(), 10);
            if (pasted.length === 6 && onComplete) onComplete(pasted);
          }
        };
        const set = (idx, val) => {
          const arr = (otp + "      ").slice(0, 6).split("");
          arr[idx] = val;
          const joined = arr.join("").slice(0, 6);
          setOtp(joined);
          return joined;
        };
        return (
          <div style={{ display: "flex", gap: 10, justifyContent: "center", margin: "18px 0" }}>
            {[0, 1, 2, 3, 4, 5].map(i => (
              <input key={i} id={`${prefix}${i}`} type="text" inputMode="numeric" maxLength={1} value={otp[i] || ""}
                onChange={e => {
                  const v = e.target.value.replace(/\D/g, "").slice(-1);
                  const joined = set(i, v);
                  if (v && i < 5) setTimeout(() => document.getElementById(`${prefix}${i + 1}`)?.focus(), 0);
                  const clean = joined.replace(/ /g, "");
                  if (clean.length === 6 && onComplete) onComplete(clean);
                }}
                onKeyDown={e => {
                  if (/^[0-9]$/.test(e.key)) {
                    e.preventDefault();
                    const joined = set(i, e.key);
                    if (i < 5) setTimeout(() => document.getElementById(`${prefix}${i + 1}`)?.focus(), 0);
                    const clean = joined.replace(/ /g, "");
                    if (clean.length === 6 && onComplete) onComplete(clean);
                  }
                  if (e.key === "Backspace") {
                    e.preventDefault();
                    if (otp[i] && otp[i].trim()) {
                      set(i, " ");
                      if (i > 0) setTimeout(() => document.getElementById(`${prefix}${i - 1}`)?.focus(), 0);
                    } else if (i > 0) {
                      set(i - 1, " ");
                      setTimeout(() => document.getElementById(`${prefix}${i - 1}`)?.focus(), 0);
                    }
                  }
                  if (e.key === "ArrowLeft" && i > 0) document.getElementById(`${prefix}${i - 1}`)?.focus();
                  if (e.key === "ArrowRight" && i < 5) document.getElementById(`${prefix}${i + 1}`)?.focus();
                }}
                onPaste={handlePaste}
                onFocus={e => e.target.select()}
                style={{
                  width: 44, height: 52, textAlign: "center", fontSize: 20, fontWeight: 700,
                  borderRadius: 11, border: `2px solid ${otp[i] && otp[i].trim() ? "#4f6a82" : "rgba(139,131,168,0.25)"}`,
                  background: otp[i] && otp[i].trim() ? "rgba(79,106,130,0.15)" : "rgba(20,14,6,0.7)",
                  color: "#ffffff", fontFamily: "monospace", transition: "all 0.15s", outline: "none", cursor: "text"
                }} />
            ))}
          </div>
        );
      };

      const sendLoginOtpEmail = async (email, otp) => {
        const svcId = window.EMAILJS_SERVICE_ID;
        const tplId = window.EMAILJS_TEMPLATE_ID;
        const pubKey = window.EMAILJS_PUBLIC_KEY;
        const ejsConfigured = svcId !== "YOUR_SERVICE_ID" && tplId !== "YOUR_TEMPLATE_ID" && pubKey !== "YOUR_PUBLIC_KEY";
        if (ejsConfigured) {
          try {
            await emailjs.send(svcId, tplId, { to_email: email, to_name: email.split("@")[0], otp_code: otp, app_name: "SocietyConnect" }, pubKey);
            return true; // sent via email — don't show on screen
          } catch (ejsErr) {
            console.warn("EmailJS failed:", ejsErr);
            return false;
          }
        }
        return false;
      };

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 99990, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, backdropFilter: "blur(6px)" }}
          onClick={e => e.target === e.currentTarget && onClose()}>
          {showForgot && <ForgotPasswordModal onClose={() => setShowForgot(false)} t={t2} />}
          <div style={{ width: "100%", maxWidth: 420, background: "rgba(14,10,5,0.98)", border: "1px solid rgba(139,131,168,0.25)", borderRadius: 22, padding: 28, boxShadow: "0 0 80px rgba(139,131,168,0.12),0 40px 80px rgba(0,0,0,0.7)", backdropFilter: "blur(24px)", position: "relative", maxHeight: "90vh", overflowY: "auto" }}>
            {/* Close button */}
            <button onClick={onClose} style={{ position: "absolute", top: 14, right: 16, background: "none", border: "none", color: "#8B83A8", fontSize: 22, cursor: "pointer", lineHeight: 1 }}>×</button>

            {/* Try Mode Banner */}
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: "rgba(139,131,168,0.1)", border: "1px solid rgba(139,131,168,0.25)", borderRadius: 12, marginBottom: 20 }}>
              <span style={{ fontSize: 20 }}>👁️</span>
              <div>
                <p style={{ fontSize: 13, fontWeight: 700, color: "#C5C0D8", margin: 0 }}>You're in Try Mode</p>
                <p style={{ fontSize: 11, color: "#8B83A8", margin: "2px 0 0" }}>Sign in or create an account to take this action</p>
              </div>
            </div>

            {/* Logo */}
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <div style={{ display: "inline-flex", width: 50, height: 50, borderRadius: 15, background: "linear-gradient(135deg,#5B4B8A,#8B83A8)", alignItems: "center", justifyContent: "center", fontSize: 22, marginBottom: 10, boxShadow: "0 0 30px rgba(139,131,168,0.4)" }}>🏙️</div>
              <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22, color: "#F0ECF9", margin: "0 0 4px", letterSpacing: "-0.4px" }}>SocietyConnect</h2>
              <p style={{ color: "#8B83A8", fontSize: 12 }}>Sign in to continue</p>
            </div>

            {/* Tabs */}
            <div style={{ display: "flex", background: "rgba(255,255,255,0.04)", borderRadius: 13, padding: 4, marginBottom: 20, gap: 4, border: "1px solid rgba(255,255,255,0.1)" }}>
              {["login", "signup"].map(m => (
                <button key={m} onClick={() => switchMode(m)} style={{
                  flex: 1, padding: "9px", borderRadius: 10, border: "none", fontSize: 13, fontWeight: 700, cursor: "pointer", transition: "all 0.2s",
                  background: mode === m ? "linear-gradient(135deg,#334155,#4f6a82)" : "rgba(255,255,255,0.06)",
                  color: mode === m ? "#ffffff" : "#94a3b8",
                  boxShadow: mode === m ? "0 2px 12px rgba(79,106,130,0.4)" : undefined
                }}>
                  {m === "login" ? "Sign In" : "Create Account"}
                </button>
              ))}
            </div>

            <div style={{ transform: flipping ? "rotateY(90deg) scale(0.96)" : "rotateY(0deg)", opacity: flipping ? 0 : 1, transition: "transform 0.28s ease,opacity 0.28s ease", willChange: "transform,opacity" }}>

              {/* LOGIN OTP STEP */}
              {otpStep && <div>
                <div style={{ textAlign: "center", marginBottom: 16 }}>
                  <div style={{ fontSize: 36, marginBottom: 8 }}>📧</div>
                  <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 18, color: "#F0ECF9", margin: "0 0 6px" }}>Verify Identity</h3>
                  <p style={{ fontSize: 13, color: "#8B83A8", lineHeight: 1.6 }}>OTP sent to <b style={{ color: "#C5C0D8" }}>{f.email}</b></p>
                </div>
                {devOtp && <div style={{ padding: "9px 12px", background: "rgba(139,131,168,0.08)", border: "1px solid rgba(139,131,168,0.25)", borderRadius: 9, fontSize: 12, color: "#C5C0D8", marginBottom: 10, textAlign: "center" }}>⚠️ Dev mode — OTP: <b style={{ letterSpacing: 3, fontSize: 16 }}>{devOtp}</b></div>}
                {err && <div style={{ padding: "9px 12px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 9, fontSize: 13, color: "#f87171", marginBottom: 10 }}>{err}</div>}
                <OtpBoxesGate otp={loginOtp} setOtp={setLoginOtp} prefix="glotp" onComplete={joined => {
                  setLoad(true); setErr("");
                  API.loginVerifyOtp(pendingUserId, joined).then(r => { localStorage.setItem("sc_token", r.token); onLogin(r.user); }).catch(e => { setErr(e.message); setLoad(false); });
                }} />
                <button onClick={async () => { setLoad(true); setErr(""); try { const r = await API.loginVerifyOtp(pendingUserId, loginOtp); localStorage.setItem("sc_token", r.token); onLogin(r.user); } catch (e) { setErr(e.message); } setLoad(false); }} disabled={load || loginOtp.length < 6}
                  style={{ width: "100%", padding: "13px", borderRadius: 12, border: "none", background: loginOtp.length === 6 ? "linear-gradient(135deg,#334155,#4f6a82)" : "rgba(60,60,60,0.5)", color: "#ffffff", fontSize: 14, fontWeight: 700, cursor: "pointer", opacity: (load) ? 0.6 : 1 }}>
                  {load ? "Verifying…" : "Confirm OTP →"}
                </button>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 8 }}>
                  <button onClick={() => { setOtpStep(false); setLoginOtp(""); setDevOtp(""); setErr(""); }} style={{ background: "none", border: "none", color: "#8B83A8", fontSize: 12, cursor: "pointer", padding: "8px" }}>← Back</button>
                  <span style={{ color: "rgba(139,131,168,0.3)", fontSize: 12 }}>|</span>
                  <button disabled={resendCooldown > 0} onClick={async () => { setErr(""); setLoginOtp(""); try { const r = await API.loginRequestOtp(f.email); setPendingUserId(r.user_id); const ejsConfigured = window.EMAILJS_SERVICE_ID !== "YOUR_SERVICE_ID"; if (ejsConfigured) { try { await emailjs.send(window.EMAILJS_SERVICE_ID, window.EMAILJS_TEMPLATE_ID, { to_email: f.email, to_name: f.email.split("@")[0], otp_code: r.otp, app_name: "SocietyConnect" }, window.EMAILJS_PUBLIC_KEY); setDevOtp(""); } catch { setDevOtp(r.otp); } } else { setDevOtp(r.otp); } startCooldown(); } catch(e) { setErr(e.message); } }} style={{ background: "none", border: "none", color: resendCooldown > 0 ? "rgba(139,131,168,0.3)" : "#7C3AED", fontSize: 12, cursor: resendCooldown > 0 ? "not-allowed" : "pointer", padding: "8px", fontWeight: 600 }}>{resendCooldown > 0 ? `Resend in ${resendCooldown}s` : "↻ Resend OTP"}</button>
                </div>
              </div>}

              {/* SIGNUP OTP STEP */}
              {signupOtpStep && <div>
                <div style={{ textAlign: "center", marginBottom: 16 }}>
                  <div style={{ fontSize: 36, marginBottom: 8 }}>✉️</div>
                  <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 18, color: "#F0ECF9", margin: "0 0 6px" }}>Verify Your Email</h3>
                  <p style={{ fontSize: 13, color: "#8B83A8", lineHeight: 1.6 }}>OTP sent to <b style={{ color: "#C5C0D8" }}>{f.email}</b></p>
                </div>
                {signupDevOtp && <div style={{ padding: "9px 12px", background: "rgba(139,131,168,0.08)", border: "1px solid rgba(139,131,168,0.25)", borderRadius: 9, fontSize: 12, color: "#C5C0D8", marginBottom: 10, textAlign: "center" }}>⚠️ Dev mode — OTP: <b style={{ letterSpacing: 3, fontSize: 16 }}>{signupDevOtp}</b></div>}
                {err && <div style={{ padding: "9px 12px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 9, fontSize: 13, color: "#f87171", marginBottom: 10 }}>{err}</div>}
                <OtpBoxesGate otp={signupOtp} setOtp={setSignupOtp} prefix="gsotp" onComplete={joined => {
                  if (joined !== signupSessionKey) { setErr("Incorrect OTP."); return; }
                  setLoad(true); setErr("");
                  API.signup({ name: f.name, email: f.email, password: f.pass, phone: f.phone.replace(/\D/g, ""), role: f.role, skill: f.role === "provider" ? f.skill : "", society: f.society, experience: f.exp || "" }).then(r => { localStorage.setItem("sc_token", r.token); onLogin(r.user); }).catch(e => { setErr(e.message); setLoad(false); });
                }} />
                <button onClick={async () => { if (signupOtp !== signupSessionKey) { setErr("Incorrect OTP."); return; } setLoad(true); setErr(""); try { const r = await API.signup({ name: f.name, email: f.email, password: f.pass, phone: f.phone.replace(/\D/g, ""), role: f.role, skill: f.role === "provider" ? f.skill : "", society: f.society, experience: f.exp || "" }); localStorage.setItem("sc_token", r.token); onLogin(r.user); } catch (e) { setErr(e.message); } setLoad(false); }} disabled={load || signupOtp.length < 6}
                  style={{ width: "100%", padding: "13px", borderRadius: 12, border: "none", background: signupOtp.length === 6 ? "linear-gradient(135deg,#334155,#4f6a82)" : "rgba(60,60,60,0.5)", color: "#ffffff", fontSize: 14, fontWeight: 700, cursor: "pointer", opacity: load ? 0.6 : 1 }}>
                  {load ? "Creating Account…" : "Verify & Join →"}
                </button>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 8 }}>
                  <button onClick={() => { setSignupOtpStep(false); setSignupOtp(""); setSignupDevOtp(""); setSignupSessionKey(null); setErr(""); }} style={{ background: "none", border: "none", color: "#8B83A8", fontSize: 12, cursor: "pointer", padding: "8px" }}>← Back</button>
                  <span style={{ color: "rgba(139,131,168,0.3)", fontSize: 12 }}>|</span>
                  <button disabled={resendCooldown > 0} onClick={async () => { setErr(""); setSignupOtp(""); const newOtp = String(Math.floor(100000 + Math.random() * 900000)); const ejsConfigured = window.EMAILJS_SERVICE_ID !== "YOUR_SERVICE_ID"; if (ejsConfigured) { try { await emailjs.send(window.EMAILJS_SERVICE_ID, window.EMAILJS_TEMPLATE_ID, { to_email: f.email, to_name: f.name, otp_code: newOtp, app_name: "SocietyConnect" }, window.EMAILJS_PUBLIC_KEY); setSignupDevOtp(""); } catch { setSignupDevOtp(newOtp); } } else { setSignupDevOtp(newOtp); } setSignupSessionKey(newOtp); startCooldown(); }} style={{ background: "none", border: "none", color: resendCooldown > 0 ? "rgba(139,131,168,0.3)" : "#7C3AED", fontSize: 12, cursor: resendCooldown > 0 ? "not-allowed" : "pointer", padding: "8px", fontWeight: 600 }}>{resendCooldown > 0 ? `Resend in ${resendCooldown}s` : "↻ Resend OTP"}</button>
                </div>
              </div>}

              {/* MAIN FORM */}
              {!otpStep && !signupOtpStep && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {mode === "signup" && <div>
                  <label style={{ fontSize: 11, fontWeight: 700, color: "#8B83A8", letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 5, display: "block" }}>Full Name</label>
                  <input value={f.name} onChange={e => sv("name", e.target.value)} placeholder="Your full name" style={IS} />
                </div>}
                <div>
                  <label style={{ fontSize: 11, fontWeight: 700, color: "#8B83A8", letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 5, display: "block" }}>Email Address</label>
                  <input type="email" value={f.email} onChange={e => sv("email", e.target.value)} placeholder="you@example.com" onKeyDown={e => e.key === "Enter" && mode === "login" && submit()} style={IS} />
                </div>
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                    <label style={{ fontSize: 11, fontWeight: 700, color: "#8B83A8", letterSpacing: "0.8px", textTransform: "uppercase", margin: 0 }}>Password</label>
                    {mode === "login" && <button onClick={() => setShowForgot(true)} style={{ background: "none", border: "none", color: "#8B83A8", fontSize: 12, fontWeight: 600, cursor: "pointer", padding: 0 }}>Forgot?</button>}
                  </div>
                  <PwInput value={f.pass} onChange={e => sv("pass", e.target.value)} placeholder={mode === "login" ? "Your password" : "Min 6 characters"} t={{ border: "rgba(139,131,168,0.2)", inp: "rgba(20,14,6,0.7)", txt: "#F0ECF9" }} onKeyDown={e => e.key === "Enter" && mode === "login" && submit()} />
                </div>
                {mode === "signup" && <>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, color: "#8B83A8", letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 5, display: "block" }}>Phone Number</label>
                    <div style={{ position: "relative" }}>
                      <span style={{ position: "absolute", left: 13, top: "50%", transform: "translateY(-50%)", fontSize: 13, color: "#8B83A8", pointerEvents: "none", zIndex: 1 }}>🇮🇳 +91</span>
                      <input value={f.phone} onChange={e => sv("phone", e.target.value.replace(/\D/g, ""))} placeholder="10-digit number" maxLength={10} style={{ ...IS, paddingLeft: "76px" }} />
                    </div>
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, color: "#8B83A8", letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 5, display: "block" }}>I Am A *</label>
                    <div style={{ display: "flex", gap: 8, background: "rgba(12,12,20,0.6)", borderRadius: 14, padding: 4, border: "1px solid rgba(139,131,168,0.2)" }}>
                      {["customer", "provider"].map(r => {
                        const isActive = f.role === r;
                        return (
                          <button key={r} onClick={() => sv("role", r)} style={{
                            flex: 1, padding: "11px 10px", borderRadius: 10,
                            border: isActive ? "1.5px solid rgba(245,158,11,0.5)" : "1.5px solid transparent",
                            fontSize: 13, fontWeight: 700,
                            background: isActive ? "linear-gradient(135deg,rgba(245,158,11,0.15),rgba(234,88,12,0.08))" : "transparent",
                            color: isActive ? "#F59E0B" : "#8B83A8", cursor: "pointer",
                            boxShadow: isActive ? "0 2px 12px rgba(245,158,11,0.15)" : "none",
                            transition: "all 0.2s"
                          }}>
                            {r === "customer" ? "🏠 Resident" : "🔧 Provider"}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  {f.role === "provider" && <>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 700, color: "#8B83A8", letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 5, display: "flex", alignItems: "baseline", gap: 6 }}>YOUR SKILL(S) * <span style={{ fontWeight: 400, fontSize: 10, color: "#6E6E82", textTransform: "none", letterSpacing: 0 }}>(select one or more)</span></label>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                        {["Plumber", "Electrician", "Cleaner", "Shifting"].map((sk, si) => {
                          const sel = (f.skill || "").split(",").map(x => x.trim()).filter(Boolean);
                          const checked = sel.includes(sk);
                          return (
                            <label key={sk} onClick={() => { let cur = sel.includes(sk) ? sel.filter(x => x !== sk) : [...sel, sk]; sv("skill", cur.join(",")); }}
                              style={{
                                display: "flex", alignItems: "center", gap: 9, padding: "11px 13px", borderRadius: 12,
                                border: `1.5px solid ${checked ? "rgba(245,158,11,0.45)" : "rgba(139,131,168,0.15)"}`,
                                background: checked ? "rgba(245,158,11,0.08)" : "rgba(30,30,46,0.5)", cursor: "pointer"
                              }}>
                              <div style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${checked ? "#F59E0B" : "rgba(255,255,255,0.15)"}`, background: checked ? "#F59E0B" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.2s" }}>
                                {checked && <span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>✓</span>}
                              </div>
                              <span style={{ fontSize: 13, fontWeight: 600, color: checked ? "#EEEEF5" : "#8B83A8" }}>{SVC_ICO[sk]} {sk}</span>
                            </label>
                          );
                        })}
                      </div>
                      {!(f.skill && f.skill.trim()) && <p style={{ fontSize: 12, color: "#F59E0B", marginTop: 6, fontWeight: 500 }}>Please select at least one skill.</p>}
                    </div>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 700, color: "#8B83A8", letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 5, display: "block" }}>Experience</label>
                      <input value={f.exp} onChange={e => sv("exp", e.target.value)} placeholder="Experience (e.g. 3 yrs)" style={IS} />
                    </div>
                  </>}
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, color: "#8B83A8", letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 5, display: "block" }}>Society</label>
                    <SocietySelect value={f.society} onChange={v => sv("society", v)} t={{ border: "rgba(139,131,168,0.2)", inp: "rgba(20,14,6,0.7)", txt: "#F0ECF9", muted: "#8B83A8" }} />
                  </div>
                </>}
                {err && <div style={{ padding: "9px 12px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 9, fontSize: 13, color: "#f87171" }}>{err}</div>}
                <button onClick={submit} disabled={load}
                  style={{ width: "100%", padding: "13px", borderRadius: 12, border: "none", background: "linear-gradient(135deg,#334155,#4f6a82)", color: "#ffffff", fontSize: 15, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 18px rgba(79,106,130,0.4)", opacity: load ? 0.6 : 1, transition: "all 0.2s", marginTop: 2 }}>
                  {load ? "Please wait…" : mode === "login" ? "Sign In →" : "Create Account →"}
                </button>
              </div>}
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       MAIN APP
    ══════════════════════════════════════ */
    function App() {
      const [showLanding, setShowLanding] = useState(true);
      const [user, setUser] = useState(null);
      const [dark, setDark] = useState(true);
      const [act, setAct] = useState("dash");
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [reqs, setReqs] = useState([]);
      const [notifs, setNotifs] = useState([]);
      const [loading, setLoading] = useState(true); // checking saved token on load
      // TRY MODE state
      const [tryMode, setTryMode] = useState(false);
      const [showLoginGate, setShowLoginGate] = useState(false);
      const [pendingAction, setPendingAction] = useState(null);

      const t = TH[dark ? "dark" : "light"];
      const unread = notifs.filter(n => !n.read_flag).length;

      // On first load — try to restore session from saved token
      useEffect(() => {
        (async () => {
          const token = localStorage.getItem("sc_token");
          if (token) {
            try {
              const u = await API.getMe();
              setUser(u); setShowLanding(false);
            } catch (e) {
              // Token expired or server down — clear token only if it's an auth error
              if (e.message && (e.message.includes("expired") || e.message.includes("Invalid token") || e.message.includes("missing"))) {
                localStorage.removeItem("sc_token");
              }
              // If server is just unreachable, keep token so user can retry
            }
          }
          setLoading(false);
        })();
      }, []);

      // Load user data whenever user logs in (once)
      const loadData = useCallback(async () => {
        if (!user) return;
        try {
          const [r, n] = await Promise.all([API.getRequests(), API.getNotifs()]);
          setReqs(r); setNotifs(n);
        } catch { }
      }, [user?.id]);

      // Only run loadData when user ID changes (login/logout), not on every render
      const prevUserIdRef = useRef(null);
      useEffect(() => {
        if (user && user.id !== prevUserIdRef.current) {
          prevUserIdRef.current = user.id;
          loadData();
        }
        if (!user) prevUserIdRef.current = null;
      }, [user?.id]);

      const handleLogin = (u) => {
        broadcastLogin();
        setUser(u); setAct("dash"); setShowLanding(false); setTryMode(false); setShowLoginGate(false);
      };
      // Called when user clicks something that requires login (try mode)
      const requireLogin = (actionName) => {
        setPendingAction(actionName);
        setShowLoginGate(true);
      };
      const handleLogout = () => {
        localStorage.removeItem("sc_token");
        setUser(null); setReqs([]); setNotifs([]); setAct("dash"); setShowLanding(true);
      };

      if (loading) return null; // Loader overlay handles this visually
      if (!user && showLanding) return <LandingPage onGetStarted={() => { setShowLanding(false); setTryMode(true); }} />;
      if (!user && !tryMode) return <Auth onLogin={handleLogin} onBack={() => setShowLanding(true)} />;

      // TRY MODE — show preview with login gate on actions
      if (!user && tryMode) {
        return <TryModeDashboard t={t} dark={dark} setDark={setDark} onRequireLogin={requireLogin} onGoSignIn={() => setShowLoginGate(true)}
          showLoginGate={showLoginGate} onCloseGate={() => setShowLoginGate(false)} onLogin={handleLogin} onBack={() => { setTryMode(false); setShowLanding(true); }} />;
      }

      return (
        <div style={{ display: "flex", height: "100vh", background: t.bg, fontFamily: "'DM Sans',sans-serif", overflow: "hidden" }}>
          <Sidebar user={user} act={act} setAct={setAct} t={t} open={sidebarOpen} onLogout={handleLogout} unread={unread} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
            <TopBar act={act} t={t} dark={dark} setDark={setDark} setOpen={setSidebarOpen} unread={unread} setAct={setAct} />
            <div style={{ flex: 1, overflowY: "auto", padding: "22px 26px", background: t.bg }} key={act} className="fade-in">
              {act === "dash" && <DashHome user={user} reqs={reqs} t={t} setAct={setAct} />}
              {act === "rules" && <RuleBook t={t} />}
              {act === "svc" && <ServiceReq user={user} t={t} onRequestCreated={r => setReqs(p => [r, ...p])} setNotifs={setNotifs} />}
              {act === "chat" && <ChatView t={t} user={user} reqs={reqs} />}
              {act === "hist" && <History t={t} reqs={reqs} onRefresh={loadData} user={user} />}
              {act === "notif" && <Notifs t={t} notifs={notifs} setNotifs={setNotifs} onRefresh={loadData} />}
              {act === "profile" && <Profile user={user} setUser={setUser} t={t} onLogout={handleLogout} />}
              {act === "support" && <Support user={user} t={t} />}
              {act === "admin" && user.role === "admin" && <AdminPanel t={t} />}
              {act === "prov" && user.role === "provider" && <ProviderPanel user={user} t={t} globalReqs={reqs} setGlobalReqs={setReqs} setNotifs={setNotifs} />}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>

  <script>
    /* PAGE LOADER */
    window.addEventListener("load", () => setTimeout(() => document.getElementById("loader").classList.add("hide"), 1200));

    /* SERVER STATUS — auto-ping, no manual toggle, just shows status */
    window.SC_ONLINE = false;
    localStorage.removeItem("sc_url");
    window.SERVER_URL = "https://societyconnect-knct.onrender.com";

    /* Cross-tab broadcast — prevent one tab's login from reloading others */
    try {
      const bc = new BroadcastChannel("sc_tab_sync");
      bc.onmessage = (e) => {
        if (e.data && e.data.type === "new_login") {
          // Another tab logged in — do NOT reload, just ignore
          console.log("[SocietyConnect] Another tab logged in, ignoring.");
        }
      };
      window._scBroadcast = bc;
    } catch { }

    function broadcastLogin() {
      try { if (window._scBroadcast) window._scBroadcast.postMessage({ type: "new_login", ts: Date.now() }); } catch { }
    }

    function updatePill(state) {
      const p = document.getElementById("srv-pill");
      const l = document.getElementById("srv-txt");
      if (!p || !l) return;
      p.className = "";
      if (state === "online") { p.classList.add("online"); l.textContent = "● server"; }
      else if (state === "offline") { p.classList.add("offline"); l.textContent = "● offline"; }
      else { p.classList.add("local"); l.textContent = "● local"; }
    }

    let _pingActive = false;
    async function pingServer() {
      if (_pingActive) return; _pingActive = true;
      try {
        const r = await fetch(window.SERVER_URL + "/api/ping", { signal: AbortSignal.timeout(3000) });
        if (r.ok) { window.SC_ONLINE = true; updatePill("online"); }
        else { window.SC_ONLINE = false; updatePill("offline"); }
      } catch { window.SC_ONLINE = false; updatePill("offline"); }
      _pingActive = false;
    }

    // Ping immediately then every 30 seconds (was 10s — reduced to avoid triggering re-renders)
    pingServer();
    setInterval(pingServer, 30000);
  </script>
</body>

</html>
