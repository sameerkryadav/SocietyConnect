    const TH = {
      dark: {
        bg: "#0C0C14", card: "#161622", card2: "#1E1E2E", border: "#2A2A3C",

    /* ══════════════════════════════════════

    ══════════════════════════════════════ */
    const API = {
      base: () => localStorage.getItem("sc_url") || "https://societyconnect-knct.onrender.com",
      token: () => localStorage.getItem("sc_token"),
      headers() {
        const h = { "Content-Type": "application/json" };
        const t = this.token();
        if (t) h["Authorization"] = `Bearer ${t}`;
        return h;
      },
      async call(path, opts = {}) {
        try {
          const r = await fetch(this.base() + path, { ...opts, headers: { ...this.headers(), ...(opts.headers || {}) } });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || "Server error");
          return d;
        } catch (e) {
          if (e.message === "Failed to fetch" || e.name === "TypeError") {
            throw new Error("Cannot reach server.");
          }
          throw e;
        }
      },
      login: (e, p) => API.call("/api/auth/login", { method: "POST", body: JSON.stringify({ email: e, password: p }) }),
      loginVerifyOtp: (userId, otp) => API.call("/api/auth/login/verify-otp", { method: "POST", body: JSON.stringify({ user_id: userId, otp }) }),
      signup: (d) => API.call("/api/auth/signup", { method: "POST", body: JSON.stringify(d) }),
      signupSendOtp: (d) => API.call("/api/auth/signup/send-otp", { method: "POST", body: JSON.stringify(d) }),

      forgotVerifyOtp: (userId, otp, newPw) => API.call("/api/auth/forgot-password/verify-otp", { method: "POST", body: JSON.stringify({ user_id: userId, otp, new_password: newPw }) }),
      getMe: () => API.call("/api/users/me"),
      updateMe: (d) => API.call("/api/users/me", { method: "PUT", body: JSON.stringify(d) }),
      deleteMe: () => API.call("/api/users/me", { method: "DELETE" }),
      switchRole: (d) => API.call("/api/users/me/switch-role", { method: "POST", body: JSON.stringify(d) }),
      updateProvider: (d) => API.call("/api/providers/me", { method: "PUT", body: JSON.stringify(d) }),
      getRequests: () => API.call("/api/requests"),
      createRequest: (d) => API.call("/api/requests", { method: "POST", body: JSON.stringify(d) }),
      updateRequest: (id, d) => API.call(`/api/requests/${id}`, { method: "PUT", body: JSON.stringify(d) }),

    async function ai(prompt, sys = "") {
      try {
        const r = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 800, system: sys, messages: [{ role: "user", content: prompt }] })
        });
        const d = await r.json();
        return d.content?.[0]?.text || "AI unavailable.";
      } catch { return "AI service unavailable."; }
    }

    function Av({ s = "?", sz = 36, col = "#8B83A8" }) { return <div style={{ width: sz, height: sz, borderRadius: "50%", background: col + "22", border: `1.5px solid ${col}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: sz * 0.35, fontWeight: 700, color: col, flexShrink: 0 }}>{(s || "?")[0]?.toUpperCase()}</div>; }
    function Badge({ s }) { const c = ST_COL[s] || { bg: "rgba(100,100,100,0.12)", c: "#9ca3af" }; return <span style={{ background: c.bg, color: c.c, fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20, whiteSpace: "nowrap" }}>{s}</span>; }
    function Card({ children, t, style = {}, onClick }) { return <div onClick={onClick} style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 14, padding: 16, ...style, cursor: onClick ? "pointer" : undefined }}>{children}</div>; }
    function Btn({ children, onClick, v = "pri", sz = "md", style = {}, disabled = false, full = false, t = {} }) {
      const szM = { sm: { padding: "6px 14px", fontSize: 12 }, md: { padding: "10px 20px", fontSize: 14 }, lg: { padding: "13px 28px", fontSize: 15 } };
      const acc = t.accent || "#8B5CF6";
      const accH = t.accentHov || "#7C3AED";
      // Each variant is self-contained: solid bg, legible text, visible border
      const vM = {
        pri: { background: acc, color: "#ffffff", fontWeight: 700, border: "none", boxShadow: `0 1px 3px rgba(0,0,0,0.3)` },
        ghost: { background: "transparent", color: t.muted || "#8888A0", border: `1px solid ${t.border || "#2A2A3C"}`, fontWeight: 500 },
        ok: { background: "rgba(16,185,129,0.15)", color: t.success || "#10B981", border: `1px solid rgba(16,185,129,0.35)`, fontWeight: 600 },
        bad: { background: "rgba(239,68,68,0.15)", color: t.error || "#F87171", border: `1px solid rgba(239,68,68,0.35)`, fontWeight: 600 },
        info: { background: t.card2 || "#1E1E2E", color: t.muted || "#8888A0", border: `1px solid ${t.border || "#2A2A3C"}`, fontWeight: 600 },
        danger: { background: "#DC2626", color: "#fff", fontWeight: 700, border: "none" },
      };
      return <button onClick={onClick} disabled={disabled} style={{ ...szM[sz], ...vM[v || "pri"], borderRadius: 10, transition: "all 0.15s", lineHeight: 1, ...(full ? { width: "100%" } : {}), ...style }}>{children}</button>;
    }
    function SH({ title, sub, t }) { return <div style={{ marginBottom: 22 }}><h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: 24, color: t.txt, margin: 0, letterSpacing: "-0.3px" }}>{title}</h2>{sub && <p style={{ color: t.muted, fontSize: 13, marginTop: 4 }}>{sub}</p>}</div>; }

    function Toast({ toasts, remove }) {
      return (
        <div style={{ position: "fixed", bottom: 60, left: "50%", transform: "translateX(-50%)", zIndex: 99999, display: "flex", flexDirection: "column", gap: 8, alignItems: "center", pointerEvents: "none", minWidth: 260, maxWidth: 380 }}>
          {toasts.map(t2 => (
            <div key={t2.id} style={{
              display: "flex", alignItems: "center", gap: 10, padding: "11px 16px", borderRadius: 12,
              background: t2.type === "error" ? "rgba(17,24,39,0.97)" : "rgba(17,24,39,0.97)",
              border: `1px solid ${t2.type === "error" ? "rgba(248,113,113,0.4)" : "rgba(16,185,129,0.4)"}`,
              color: t2.type === "error" ? "#F87171" : "#6ee7b7",
              fontSize: 13, fontWeight: 600, boxShadow: "0 8px 32px rgba(0,0,0,0.5)",
              backdropFilter: "blur(12px)", pointerEvents: "all",
              animation: "fadeIn 0.2s ease", whiteSpace: "pre-line", textAlign: "center"
            }}>
              <span style={{ fontSize: 16, flexShrink: 0 }}>{t2.type === "error" ? "❌" : "✅"}</span>
              <span>{t2.msg}</span>
            </div>
          ))}
        </div>
      );
    }

    function useToast() {
      const [toasts, setToasts] = useState([]);
      const show = (msg, type = "error") => {
        const id = Date.now() + Math.random();
        setToasts(p => [...p, { id, msg, type }]);
        setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3200);
      };
      const err = (msg) => show(msg, "error");
      const ok = (msg) => show(msg, "ok");
      return { toasts, err, ok, show };
    }

    /* ══════════════════════════════════════
       FORGOT PASSWORD MODAL
    ══════════════════════════════════════ */
    function ForgotPasswordModal({ onClose, t }) {
      const [step, setStep] = useState(1); // 1=email, 2=otp+newpw
      const [email, setEmail] = useState("");
      const [userId, setUserId] = useState(null);
      const [otp, setOtp] = useState("");
      const [newPw, setNewPw] = useState("");
      const [msg, setMsg] = useState("");
      const [err, setErr] = useState("");
      const [load, setLoad] = useState(false);
      const [devOtp, setDevOtp] = useState(""); // shown when email not configured

      const requestOtp = async () => {
        if (!email) { setErr("Enter your email address."); return; }
        setLoad(true); setErr("");
        try {
          const r = await API.forgotPw(email);
          setUserId(r.user_id);
          if (r.otp) setDevOtp(r.otp); // dev mode: no email configured
          setMsg(r.email_sent ? "OTP sent to your email! Check inbox." : "OTP generated (email not configured).");
          setStep(2);
        } catch (e) { setErr(e.message); }
        setLoad(false);
      };

      const doReset = async () => {
        const cleanOtp = otp.replace(/ /g, "");
        if (!cleanOtp || !newPw) { setErr("Enter the OTP and new password."); return; }
        if (newPw.length < 6) { setErr("Password must be at least 6 characters."); return; }
        setLoad(true); setErr("");
        try {
          await API.forgotVerifyOtp(userId, cleanOtp, newPw);
          setMsg("✅ Password reset! You can now log in.");
          setTimeout(onClose, 1800);
        } catch (e) { setErr(e.message); }
        setLoad(false);
      };

      return (
        <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-box">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
              <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 20, color: "#e6edf3", margin: 0 }}>🔑 Reset Password</h3>
              <button onClick={onClose} style={{ background: "none", border: "none", color: "#7d8590", fontSize: 22, lineHeight: 1 }}>×</button>
            </div>
            <ErrBox msg={err} t={{ border: "" }} />
            <OkBox msg={msg} t={{ border: "" }} />
            {step === 1 && <>
              <p style={{ fontSize: 13, color: "#7d8590", marginBottom: 12 }}>Enter your registered email. A 6-digit OTP will be sent to it.</p>
              <input value={email} onChange={e => setEmail(e.target.value)} placeholder="Email address" onKeyDown={e => e.key === "Enter" && requestOtp()}
                style={{ width: "100%", padding: "11px 14px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(0,0,0,0.3)", color: "#e6edf3", fontSize: 14, boxSizing: "border-box", marginBottom: 12 }} />
              <Btn onClick={requestOtp} disabled={load} full>{load ? "Sending OTP…" : "Send OTP →"}</Btn>
            </>}
            {step === 2 && <>
              <p style={{ fontSize: 13, color: "#7d8590", marginBottom: 4 }}>Enter the 6-digit OTP sent to <b style={{ color: "#8B83A8" }}>{email}</b> and your new password.</p>
              {devOtp && <div style={{ padding: "8px 12px", background: "rgba(139,131,168,0.08)", border: "1px solid rgba(139,131,168,0.25)", borderRadius: 8, fontSize: 12, color: "#8B83A8", marginBottom: 10 }}>
                ⚠️ Email not configured — your OTP is: <b style={{ letterSpacing: 3, fontSize: 16 }}>{devOtp}</b>
              </div>}
              <div style={{ display: "flex", gap: 8, marginBottom: 12, justifyContent: "center" }}>
                {[0, 1, 2, 3, 4, 5].map(i => (
                  <input key={i} id={`fotp${i}`} type="text" inputMode="numeric" maxLength={1} value={otp[i] || ""}
                    onChange={e => {
                      const v = e.target.value.replace(/\D/g, "").slice(-1);
                      const arr = (otp + "      ").slice(0, 6).split("");
                      arr[i] = v; const joined = arr.join("").slice(0, 6); setOtp(joined);
                      if (v && i < 5) setTimeout(() => document.getElementById(`fotp${i + 1}`)?.focus(), 0);
                    }}
                    onKeyDown={e => {
                      if (/^[0-9]$/.test(e.key)) {
                        e.preventDefault();
                        const arr = (otp + "      ").slice(0, 6).split(""); arr[i] = e.key;
                        const joined = arr.join("").slice(0, 6); setOtp(joined);
                        if (i < 5) setTimeout(() => document.getElementById(`fotp${i + 1}`)?.focus(), 0);
                      }
                      if (e.key === "Backspace") {
                        e.preventDefault();
                        const arr = (otp + "      ").slice(0, 6).split("");
                        if (otp[i] && otp[i].trim()) {
                          arr[i] = " "; setOtp(arr.join("").slice(0, 6));
                          if (i > 0) setTimeout(() => document.getElementById(`fotp${i - 1}`)?.focus(), 0);
                        } else if (i > 0) {
                          arr[i - 1] = " "; setOtp(arr.join("").slice(0, 6));
                          setTimeout(() => document.getElementById(`fotp${i - 1}`)?.focus(), 0);
                        }
                      }
                      if (e.key === "ArrowLeft" && i > 0) document.getElementById(`fotp${i - 1}`)?.focus();
                      if (e.key === "ArrowRight" && i < 5) document.getElementById(`fotp${i + 1}`)?.focus();
                    }}
                    onPaste={e => { e.preventDefault(); const p = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6); if (p) { setOtp(p); setTimeout(() => document.getElementById(`fotp${Math.min(p.length, 5)}`)?.focus(), 10); } }}
                    onFocus={e => e.target.select()}
                    style={{ width: 40, height: 46, textAlign: "center", fontSize: 18, fontWeight: 700, borderRadius: 10, border: `2px solid ${otp[i] && otp[i].trim() ? "#8B5CF6" : "#2A2A3C"}`, background: otp[i] && otp[i].trim() ? "rgba(139,92,246,0.1)" : "#1E1E2E", color: otp[i] && otp[i].trim() ? "#EEEEF5" : "#8888A0", fontFamily: "monospace", outline: "none", cursor: "text", flexShrink: 0 }} />
                ))}
              </div>
              <PwInput value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="New Password (min 6 chars)" t={{ border: "#2A2A3C", inp: "#1E1E2E", txt: "#EEEEF5" }} />
              <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                <Btn v="ghost" onClick={() => { setStep(1); setOtp(""); setDevOtp(""); setErr(""); setMsg(""); }}>← Back</Btn>
                <Btn onClick={doReset} disabled={load || otp.replace(/ /g,"").length < 6} full>{load ? "Verifying…" : "Reset Password ✓"}</Btn>
              </div>
            </>}
          </div>
        </div>
      );
    }

        }
        if (!f.name.trim()) return "Full name is required.";
        if (!f.email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(f.email)) return "Enter a valid email address.";
        if (!f.pass || f.pass.length < 6) return "Password must be at least 6 characters.";
        if (!f.phone || f.phone.replace(/\D/g, "").length < 10) return "Enter a valid 10-digit phone number.";
        if (f.role === "provider" && !f.skill) return "Please select your skill.";
        if (!f.society) return "Please select your society.";
        return null;
      };

      const submit = async () => {
        const e = validate();
        if (e) { setErr(e); return; }
        setLoad(true); setErr("");
        try {
          if (mode === "login") {
            const r = await API.login(f.email, f.pass);
            if (r.otp_required) {
              setPendingUserId(r.user_id);
              // Try to send OTP via EmailJS (same as signup)
              if (r.otp) {
                const svcId = window.EMAILJS_SERVICE_ID;
                const tplId = window.EMAILJS_TEMPLATE_ID;
                const pubKey = window.EMAILJS_PUBLIC_KEY;
                const ejsConfigured = svcId !== "YOUR_SERVICE_ID" && tplId !== "YOUR_TEMPLATE_ID" && pubKey !== "YOUR_PUBLIC_KEY";
                if (ejsConfigured) {
                  try {
                    await emailjs.send(svcId, tplId, { to_email: f.email, to_name: f.email.split("@")[0], otp_code: r.otp, app_name: "SocietyConnect" }, pubKey);
                    // OTP sent via email — don't show on screen
                  } catch (ejsErr) {
                    console.warn("EmailJS failed for login OTP:", ejsErr);
                    setDevOtp(r.otp); // fallback: show on screen only if email fails
                  }
                } else {
                  setDevOtp(r.otp); // dev mode: no emailjs configured
                }
              }
              setOtpStep(true);
            } else {
              localStorage.setItem("sc_token", r.token);
              onLogin(r.user);
            }
          } else {
            const generatedOtp = String(Math.floor(100000 + Math.random() * 900000));
            const svcId = window.EMAILJS_SERVICE_ID;
            const tplId = window.EMAILJS_TEMPLATE_ID;
            const pubKey = window.EMAILJS_PUBLIC_KEY;
            const ejsConfigured = svcId !== "YOUR_SERVICE_ID" && tplId !== "YOUR_TEMPLATE_ID" && pubKey !== "YOUR_PUBLIC_KEY";
            if (ejsConfigured) {
              try {
                await emailjs.send(svcId, tplId, {
                  to_email: f.email,
                  to_name: f.name,
                  otp_code: generatedOtp,
                  app_name: "SocietyConnect"
                }, pubKey);
                setSignupDevOtp("");
              } catch (ejsErr) {
                console.warn("EmailJS send failed:", ejsErr);
                setSignupDevOtp(generatedOtp);
              }
            } else {
              setSignupDevOtp(generatedOtp);
            }
            setSignupSessionKey(generatedOtp);
            setSignupOtpStep(true);
          }
        } catch (e) { setErr(e.message); }
        setLoad(false);
      };

      const OtpBoxes = ({ otp, setOtp, prefix, onComplete }) => {
        const handlePaste = (e) => {
          e.preventDefault();
          const pasted = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);
          if (pasted.length > 0) {
            setOtp(pasted);
            const nextIdx = Math.min(pasted.length, 5);
            setTimeout(() => document.getElementById(`${prefix}${nextIdx}`)?.focus(), 10);
            if (pasted.length === 6 && onComplete) onComplete(pasted);
          }
        };
        const set = (idx, val) => {
          const arr = (otp + "      ").slice(0, 6).split("");
          arr[idx] = val;
          const joined = arr.join("").slice(0, 6);
          setOtp(joined);
          return joined;
        };
        return (
          <div style={{ display: "flex", gap: 10, justifyContent: "center", margin: "20px 0" }}>
            {[0, 1, 2, 3, 4, 5].map(i => (
              <input key={i} id={`${prefix}${i}`} type="text" inputMode="numeric" maxLength={1} value={otp[i] || ""}
                onChange={e => {
                  const v = e.target.value.replace(/\D/g, "").slice(-1);
                  const joined = set(i, v);
                  if (v && i < 5) setTimeout(() => document.getElementById(`${prefix}${i + 1}`)?.focus(), 0);
                  const clean = joined.replace(/ /g, "");
                  if (clean.length === 6 && onComplete) onComplete(clean);
                }}
                onKeyDown={e => {
                  if (/^[0-9]$/.test(e.key)) {
                    e.preventDefault();
                    const joined = set(i, e.key);
                    if (i < 5) setTimeout(() => document.getElementById(`${prefix}${i + 1}`)?.focus(), 0);
                    const clean = joined.replace(/ /g, "");
                    if (clean.length === 6 && onComplete) onComplete(clean);
                  }
                  if (e.key === "Backspace") {
                    e.preventDefault();
                    if (otp[i]) { set(i, " "); }
                    else if (i > 0) { set(i - 1, " "); setTimeout(() => document.getElementById(`${prefix}${i - 1}`)?.focus(), 0); }
                  }
                  if (e.key === "ArrowLeft" && i > 0) document.getElementById(`${prefix}${i - 1}`)?.focus();
                  if (e.key === "ArrowRight" && i < 5) document.getElementById(`${prefix}${i + 1}`)?.focus();
                }}
                onPaste={handlePaste}
                onFocus={e => e.target.select()}
                style={{
                  width: 46, height: 56, textAlign: "center", fontSize: 22, fontWeight: 700,
                  borderRadius: 12,
                  border: `2px solid ${otp[i] && otp[i].trim() ? "#8B5CF6" : "#2A2A3C"}`,
                  background: otp[i] && otp[i].trim() ? "rgba(139,92,246,0.1)" : "#1E1E2E",
                  color: otp[i] && otp[i].trim() ? "#EEEEF5" : "#8888A0",
                  fontFamily: "monospace", transition: "all 0.15s", outline: "none",
                }} />
            ))}
          </div>
        );
      };

      // Auth page wrapper styles
      const authS = {
        page: {
          minHeight: "100vh", display: "flex",
          background: "#0C0C14",
          fontFamily: "'DM Sans',sans-serif",

          alignItems: "center", justifyContent: "center",

          padding: "40px 5%", minWidth: 0,
        },
        card: {
          width: "100%", maxWidth: 460,
          background: "#161622",
          border: "1px solid #2A2A3C",
          borderRadius: 24, padding: 36,
          backdropFilter: "blur(20px)",
          boxShadow: "0 0 60px rgba(139,92,246,0.06),0 40px 80px rgba(0,0,0,0.5)",

        tab: {
          display: "flex", background: "#0C0C14",

          border: "1px solid #2A2A3C",

        tabBtn: (active) => ({
          flex: 1, padding: "10px", borderRadius: 11, border: "none",
          fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.2s",

          color: active ? "#ffffff" : "#8888A0",

        submitBtn: {

        errBox: {
          padding: "10px 14px", background: "rgba(239,68,68,0.1)",
          border: "1px solid rgba(239,68,68,0.3)", borderRadius: 10,
          fontSize: 13, color: "#F87171", marginBottom: 14,
        },
        devBox: {

      return (
        <div style={authS.page}>
          <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        @keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(3%,5%) scale(1.08);}}
        @keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-3%,-4%) scale(1.06);}}

        @keyframes shimmerBtn{0%{background-position:200% center;}100%{background-position:-200% center;}}

          {/* Back button */}
          {onBack && <button onClick={onBack} style={{ position: "fixed", top: 20, left: 20, zIndex: 1000, display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 10, border: "1px solid rgba(197,192,216,0.2)", background: "rgba(16,16,28,0.9)", color: "#C5C0D8", fontSize: 13, fontWeight: 600, cursor: "pointer", backdropFilter: "blur(10px)" }}>
            ← Back to Home
          </button>}

          {/* Center auth card */}
          <div style={{ ...authS.rightPanel, flex: 1, zIndex: 1 }}>
            {showForgot && <ForgotPasswordModal onClose={() => setShowForgot(false)} t={t} />}
            <div style={{ width: "100%", maxWidth: 460, position: "relative" }}>
              {/* CLOSE / BACK button — prominent, always visible */}
              {onBack && <button onClick={onBack} style={{ position: "absolute", top: -14, right: -14, zIndex: 10, width: 36, height: 36, borderRadius: "50%", background: "rgba(91,75,138,0.8)", border: "1px solid rgba(197,192,216,0.25)", color: "#C5C0D8", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", backdropFilter: "blur(8px)", transition: "all 0.2s", lineHeight: 1 }} title="Close">×</button>}

              {/* Logo */}
              <div style={{ textAlign: "center", marginBottom: 28, animation: "fadeUp 0.5s 0.1s both ease" }}>
                <div style={{ display: "inline-flex", width: 60, height: 60, borderRadius: 18, background: "linear-gradient(135deg,#7C3AED,#8B5CF6)", alignItems: "center", justifyContent: "center", fontSize: 26, marginBottom: 14, boxShadow: "0 0 40px rgba(139,92,246,0.3)" }}>🏙️</div>
                <h1 style={{ fontFamily: "'Playfair Display',serif", fontSize: 26, color: "#EEEEF5", margin: "0 0 6px", letterSpacing: "-0.5px" }}>SocietyConnect</h1>
                <p style={{ color: "#8888A0", fontSize: 13 }}>Your community, connected &amp; smarter</p>
              </div>

              <div style={{ ...authS.card, background: "#161622", border: "1px solid #2A2A3C", boxShadow: "0 0 60px rgba(139,92,246,0.06),0 40px 80px rgba(0,0,0,0.6)", transform: flipping ? "rotateY(90deg) scale(0.96)" : "rotateY(0deg) scale(1)", opacity: flipping ? 0 : 1, willChange: "transform,opacity" }}>

                {/* ── LOGIN OTP STEP ── */}
                {otpStep && <div className="fade-in">
                  <div style={{ textAlign: "center", marginBottom: 20 }}>
                    <div style={{ fontSize: 40, marginBottom: 10 }}>📧</div>
                    <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 21, color: "#f1f5f9", margin: "0 0 8px" }}>Verify Identity</h3>
                    <p style={{ fontSize: 13, color: "#8B83A8", lineHeight: 1.6 }}>6-digit OTP sent to<br /><b style={{ color: "#C5C0D8" }}>{f.email}</b></p>
                  </div>
                  {devOtp && <div style={authS.devBox}>⚠️ Dev mode — OTP: <b style={{ letterSpacing: 3, fontSize: 18 }}>{devOtp}</b></div>}
                  {err && <div style={authS.errBox}>{err}</div>}
                  <OtpBoxes otp={loginOtp} setOtp={setLoginOtp} prefix="lotp" onComplete={joined => {
                    setLoad(true); setErr("");
                    API.loginVerifyOtp(pendingUserId, joined).then(r => { localStorage.setItem("sc_token", r.token); onLogin(r.user); }).catch(e => { setErr(e.message); setLoad(false); });
                  }} />
                  <button className="auth-btn-pri" onClick={async () => { setLoad(true); setErr(""); try { const r = await API.loginVerifyOtp(pendingUserId, loginOtp); localStorage.setItem("sc_token", r.token); onLogin(r.user); } catch (e) { setErr(e.message); } setLoad(false); }} disabled={load || loginOtp.length < 6} style={{ ...authS.submitBtn, opacity: (load || loginOtp.length < 6) ? 0.5 : 1 }}>{load ? "Verifying…" : "Confirm OTP →"}</button>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 10 }}>
                    <button onClick={() => { setOtpStep(false); setLoginOtp(""); setDevOtp(""); setErr(""); }} style={{ background: "none", border: "none", color: "#8B83A8", fontSize: 12, cursor: "pointer", padding: "8px" }}>← Back</button>
                    <span style={{ color: "#2A2A3C", fontSize: 12 }}>|</span>
                    <button disabled={resendCooldown > 0} onClick={async () => { setErr(""); setLoginOtp(""); try { const r = await API.loginRequestOtp(f.email); setPendingUserId(r.user_id); const ejsConfigured = window.EMAILJS_SERVICE_ID !== "YOUR_SERVICE_ID"; if (ejsConfigured) { try { await emailjs.send(window.EMAILJS_SERVICE_ID, window.EMAILJS_TEMPLATE_ID, { to_email: f.email, to_name: f.email.split("@")[0], otp_code: r.otp, app_name: "SocietyConnect" }, window.EMAILJS_PUBLIC_KEY); setDevOtp(""); } catch { setDevOtp(r.otp); } } else { setDevOtp(r.otp); } startCooldown(); } catch(e) { setErr(e.message); } }} style={{ background: "none", border: "none", color: resendCooldown > 0 ? "#4A4A5C" : "#8B5CF6", fontSize: 12, cursor: resendCooldown > 0 ? "not-allowed" : "pointer", padding: "8px", fontWeight: 600 }}>{resendCooldown > 0 ? `Resend in ${resendCooldown}s` : "↻ Resend OTP"}</button>
                  </div>
                </div>}

                {/* ── SIGNUP OTP STEP ── */}
                {signupOtpStep && <div className="fade-in">
                  <div style={{ textAlign: "center", marginBottom: 20 }}>
                    <div style={{ fontSize: 40, marginBottom: 10 }}>✉️</div>
                    <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 21, color: "#f1f5f9", margin: "0 0 8px" }}>Verify Your Email</h3>
                    <p style={{ fontSize: 13, color: "#8B83A8", lineHeight: 1.6 }}>OTP sent to<br /><b style={{ color: "#C5C0D8" }}>{f.email}</b></p>
                  </div>
                  {signupDevOtp && <div style={authS.devBox}>⚠️ Dev mode — OTP: <b style={{ letterSpacing: 3, fontSize: 18 }}>{signupDevOtp}</b></div>}
                  {err && <div style={authS.errBox}>{err}</div>}
                  <OtpBoxes otp={signupOtp} setOtp={setSignupOtp} prefix="sotp" onComplete={joined => {
                    if (joined !== signupSessionKey) { setErr("Incorrect OTP. Please try again."); return; }
                    setLoad(true); setErr("");
                    API.signup({ name: f.name, email: f.email, password: f.pass, phone: f.phone.replace(/\D/g, ""), role: f.role, skill: f.role === "provider" ? f.skill : "", society: f.society, experience: f.exp || "" }).then(r => { localStorage.setItem("sc_token", r.token); onLogin(r.user); }).catch(e => { setErr(e.message); setLoad(false); });
                  }} />
                  <button className="auth-btn-pri" onClick={async () => { if (signupOtp !== signupSessionKey) { setErr("Incorrect OTP."); return; } setLoad(true); setErr(""); try { const r = await API.signup({ name: f.name, email: f.email, password: f.pass, phone: f.phone.replace(/\D/g, ""), role: f.role, skill: f.role === "provider" ? f.skill : "", society: f.society, experience: f.exp || "" }); localStorage.setItem("sc_token", r.token); onLogin(r.user); } catch (e) { setErr(e.message); } setLoad(false); }} disabled={load || signupOtp.length < 6} style={{ ...authS.submitBtn, opacity: (load || signupOtp.length < 6) ? 0.5 : 1 }}>{load ? "Creating Account…" : "Verify & Join →"}</button>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 10 }}>
                    <button onClick={() => { setSignupOtpStep(false); setSignupOtp(""); setSignupDevOtp(""); setSignupSessionKey(null); setErr(""); }} style={{ background: "none", border: "none", color: "#8B83A8", fontSize: 12, cursor: "pointer", padding: "8px" }}>← Back</button>
                    <span style={{ color: "#2A2A3C", fontSize: 12 }}>|</span>
                    <button disabled={resendCooldown > 0} onClick={async () => { setErr(""); setSignupOtp(""); const newOtp = String(Math.floor(100000 + Math.random() * 900000)); const ejsConfigured = window.EMAILJS_SERVICE_ID !== "YOUR_SERVICE_ID"; if (ejsConfigured) { try { await emailjs.send(window.EMAILJS_SERVICE_ID, window.EMAILJS_TEMPLATE_ID, { to_email: f.email, to_name: f.name, otp_code: newOtp, app_name: "SocietyConnect" }, window.EMAILJS_PUBLIC_KEY); setSignupDevOtp(""); } catch { setSignupDevOtp(newOtp); } } else { setSignupDevOtp(newOtp); } setSignupSessionKey(newOtp); startCooldown(); }} style={{ background: "none", border: "none", color: resendCooldown > 0 ? "#4A4A5C" : "#8B5CF6", fontSize: 12, cursor: resendCooldown > 0 ? "not-allowed" : "pointer", padding: "8px", fontWeight: 600 }}>{resendCooldown > 0 ? `Resend in ${resendCooldown}s` : "↻ Resend OTP"}</button>

                {/* ── MAIN FORM ── */}

                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

                    <div className="auth-field-reveal" style={{ animationDelay: mode === "signup" ? "0.1s" : "0.05s" }}>

                    </div>

                    {mode === "signup" && <>

                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                            {["Plumber", "Electrician", "Cleaner", "Shifting"].map((sk, si) => {
                              const sel = (f.skill || "").split(",").map(x => x.trim()).filter(Boolean);
                              const checked = sel.includes(sk);
                              return (
                                <label key={sk} className="skill-checkbox" onClick={() => { let cur = sel.includes(sk) ? sel.filter(x => x !== sk) : [...sel, sk]; sv("skill", cur.join(",")); }}

                                    display: "flex", alignItems: "center", gap: 9, padding: "11px 13px", borderRadius: 12,
                                    border: `1.5px solid ${checked ? "rgba(245,158,11,0.45)" : "rgba(255,255,255,0.07)"}`,
                                    background: checked ? "rgba(245,158,11,0.08)" : "rgba(30,30,46,0.5)", cursor: "pointer",
                                    animation: `scrollRevealUp 0.4s ${0.32 + si * 0.06}s both cubic-bezier(0.16,1,0.3,1)`

                                  <div style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${checked ? "#F59E0B" : "rgba(255,255,255,0.15)"}`, background: checked ? "#F59E0B" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.2s" }}>
                                    {checked && <span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>✓</span>}
                                  </div>
                                  <span style={{ fontSize: 13, fontWeight: 600, color: checked ? "#EEEEF5" : "#8888A0" }}>{SVC_ICO[sk]} {sk}</span>
                                </label>
                              );
                            })}
                          </div>
                          {f.role === "provider" && !(f.skill && f.skill.trim()) && <p style={{ fontSize: 12, color: "#F59E0B", marginTop: 8, fontWeight: 500, animation: "fadeUp 0.3s ease" }}>Please select at least one skill.</p>}
                        </div>
                        <div className="auth-field-reveal" style={{ animationDelay: "0.38s" }}>
                          <label style={authS.label}>Experience</label>
                          <input className="auth-input" value={f.exp} onChange={e => sv("exp", e.target.value)} placeholder="Experience (e.g. 3 yrs)" style={IS} />
                        </div>
                      </>}

                      <div className="auth-field-reveal" style={{ animationDelay: f.role === "provider" ? "0.44s" : "0.3s" }}>
                        <label style={authS.label}>YOUR SOCIETY *</label>
                        <SocietySelect value={f.society} onChange={v => sv("society", v)} t={{ border: "rgba(139,92,246,0.2)", inp: "rgba(15,20,40,0.6)", txt: "#e2e8f0", muted: "#8888A0" }} />
                      </div>
                    </>}

                    {err && <div style={{ ...authS.errBox, animation: "scrollRevealUp 0.3s ease" }}>{err}</div>}

                    <button className="auth-btn-pri" onClick={submit} disabled={load}
                      style={{
                        ...authS.submitBtn,
                        background: "linear-gradient(135deg,#F59E0B,#EA580C,#D97706)",
                        backgroundSize: "200% auto",
                        color: "#ffffff",
                        opacity: load ? 0.6 : 1,
                        boxShadow: "0 4px 20px rgba(245,158,11,0.3), 0 1px 3px rgba(0,0,0,0.3)",
                        fontSize: 15, fontWeight: 700, letterSpacing: "0.3px",
                        animation: mode === "signup" ? (f.role === "provider" ? "scrollRevealUp 0.5s 0.5s both cubic-bezier(0.16,1,0.3,1)" : "scrollRevealUp 0.5s 0.35s both cubic-bezier(0.16,1,0.3,1)") : "scrollRevealUp 0.5s 0.2s both cubic-bezier(0.16,1,0.3,1)",
                      }}>
                      {load ? "Please wait…" : mode === "login" ? "Sign In →" : "Create Account →"}
                    </button>
                  </div>
                </>}
              </div>
            </div>
          </div>
        </div>
      );
    }

          </div>

          {/* Recent Activity */}
          <div style={{ borderRadius: 20, padding: "18px", background: "linear-gradient(135deg,rgba(16,16,28,0.95),rgba(14,14,22,0.98))", border: "1px solid rgba(139,131,168,0.15)", boxShadow: "0 4px 24px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.03)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <p style={{ fontSize: 14, fontWeight: 700, color: "#F0ECF9", margin: 0 }}>Recent Activity</p>
              <button onClick={() => setAct("hist")} style={{ fontSize: 12, color: "#8B83A8", background: "rgba(139,131,168,0.1)", border: "1px solid rgba(139,131,168,0.2)", borderRadius: 20, padding: "4px 12px", fontWeight: 600, cursor: "pointer" }}>View All →</button>
            </div>
            {reqs.length === 0
              ? <div style={{ textAlign: "center", padding: "28px 0", color: "#8B83A8", fontSize: 13 }}>
                <div style={{ fontSize: 32, marginBottom: 8, opacity: 0.35 }}>◈</div>No service requests yet.
              </div>
              : reqs.slice(0, 3).map(r => (
                <div key={r.id} className="activity-row-3d" style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 13px", background: "rgba(139,131,168,0.06)", borderRadius: 13, marginBottom: 8, border: "1px solid rgba(139,131,168,0.08)" }}>
                  <div style={{ width: 38, height: 38, borderRadius: 11, background: "linear-gradient(135deg,#5B4B8A,#8B83A8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0, boxShadow: "0 3px 10px rgba(139,131,168,0.3)" }}>{SVC_ICO[r.service_type] || "◆"}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <p style={{ fontSize: 13, fontWeight: 600, color: "#F0ECF9", margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.service_type} — {r.description}</p>
                    <p style={{ fontSize: 11, color: "#8B83A8", margin: "2px 0 0" }}>{r.created_at}</p>
                  </div>
                  <Badge s={r.status} />
                </div>
              ))
            }
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       RULE BOOK (3D Redesigned)
    ══════════════════════════════════════ */
    function RuleBook({ t }) {
      const [q, setQ] = useState("");
      const [cat, setCat] = useState("All");
      const [aiQ, setAiQ] = useState("");
      const [aiA, setAiA] = useState("");
      const [aiLoad, setAiLoad] = useState(false);
      const [showAi, setShowAi] = useState(false);
      const [expanded, setExpanded] = useState(null);
      const rules = SHAPOORJI_RULES;
      const cats = ["All", ...new Set(rules.map(r => r.cat))];
      const filtered = rules.filter(r => (cat === "All" || r.cat === cat) && (q === "" || r.title.toLowerCase().includes(q.toLowerCase()) || r.body.toLowerCase().includes(q.toLowerCase())));
      const askAI = async () => {
        if (!aiQ.trim()) return; setAiLoad(true); setAiA("");
        const ctx = rules.map(r => `[${r.title}]: ${r.body}`).join("\n\n");
        const ans = await ai(aiQ, `You are a helpful assistant for residents of Shapoorji Complex. Answer based ONLY on these rules:\n\n${ctx}\n\nBe concise and friendly.`);
        setAiA(ans); setAiLoad(false);
      };
      const catColors = { "All": "#8B83A8", "Eligibility": "#5a7a6a", "Parking": "#4a6a8a", "Possession": "#6a5a8a", "Payment": "#8a5a6a", "Maintenance": "#6a7a4a", "Modifications": "#7a6a4a", "Cancellation": "#8a4a4a", "Legal": "#4a6a7a" };
      return (
        <div className="fade-in">
          <style>{`
        .rule-card-3d{transition:all 0.22s cubic-bezier(0.16,1,0.3,1);}
        .rule-card-3d:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.4),0 4px 12px rgba(139,131,168,0.2)!important;}
        .cat-pill-3d{transition:all 0.18s ease;}
        .cat-pill-3d:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(139,131,168,0.3)!important;}
      `}</style>

          {/* Header */}
          <div style={{ marginBottom: 24, padding: "20px 22px", borderRadius: 20, background: "linear-gradient(135deg,rgba(91,75,138,0.18),rgba(139,131,168,0.12))", border: "1px solid rgba(139,131,168,0.2)", boxShadow: "0 8px 32px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.05)" }}>
            <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: 22, color: "#F0ECF9", margin: "0 0 4px", letterSpacing: "-0.3px" }}>◉ Rule Book</h2>
            <p style={{ color: "#8B83A8", fontSize: 13, margin: 0 }}>Official rules — Shapoorji Complex, New Town</p>
          </div>

          {/* Search + AI */}
          <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
            <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search rules…" style={{ ...iStyle(t), flex: 1, borderRadius: 13, background: "rgba(16,16,28,0.9)", border: "1px solid rgba(139,131,168,0.2)", color: "#F0ECF9" }} />
            <button onClick={() => setShowAi(!showAi)} className="cat-pill-3d" style={{ padding: "10px 16px", borderRadius: 13, border: `1px solid ${showAi ? "rgba(139,131,168,0.5)" : "rgba(139,131,168,0.2)"}`, fontSize: 13, fontWeight: 700, background: showAi ? "linear-gradient(135deg,#5B4B8A,#8B83A8)" : "rgba(139,131,168,0.08)", color: showAi ? "#F0ECF9" : "#8B83A8", whiteSpace: "nowrap", cursor: "pointer", boxShadow: showAi ? "0 4px 16px rgba(139,131,168,0.3)" : "none" }}>🤖 Ask AI</button>
          </div>

          {showAi && <div style={{ marginBottom: 16, borderRadius: 18, padding: "16px", background: "linear-gradient(135deg,rgba(91,75,138,0.15),rgba(139,131,168,0.1))", border: "1px solid rgba(139,131,168,0.25)", boxShadow: "0 4px 20px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04)" }}>
            <p style={{ fontSize: 13, fontWeight: 700, color: "#C5C0D8", margin: "0 0 12px", display: "flex", alignItems: "center", gap: 8 }}>🤖 <span>Ask AI about Society Rules</span></p>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={aiQ} onChange={e => setAiQ(e.target.value)} placeholder="Ask anything about the rules…" onKeyDown={e => e.key === "Enter" && askAI()} style={{ ...iStyle(t), flex: 1, background: "rgba(10,9,6,0.6)", border: "1px solid rgba(139,131,168,0.2)", color: "#F0ECF9", borderRadius: 11 }} />
              <Btn onClick={askAI} disabled={aiLoad}>{aiLoad ? "…" : "Ask"}</Btn>
            </div>
            {aiA && <div style={{ marginTop: 12, padding: 14, background: "rgba(0,0,0,0.2)", borderRadius: 12, fontSize: 13, color: "#F0ECF9", lineHeight: 1.8, borderLeft: "3px solid #8B83A8", boxShadow: "inset 0 0 0 1px rgba(139,131,168,0.1)" }}>{aiA}</div>}
          </div>}

          {/* Category pills */}
          <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
            {cats.map(c => (
              <button key={c} onClick={() => setCat(c)} className="cat-pill-3d" style={{
                padding: "6px 16px", borderRadius: 20, cursor: "pointer",
                border: `1px solid ${cat === c ? "rgba(139,131,168,0.5)" : "rgba(139,131,168,0.15)"}`,
                fontSize: 12, fontWeight: 700,
                background: cat === c ? "linear-gradient(135deg,#5B4B8A,#8B83A8)" : "rgba(139,131,168,0.06)",
                color: cat === c ? "#F0ECF9" : "rgba(197,192,216,0.6)",
                boxShadow: cat === c ? "0 4px 14px rgba(139,131,168,0.35),inset 0 1px 0 rgba(255,255,255,0.1)" : "none",
              }}>{c}</button>
            ))}
          </div>

          {/* Rule cards */}
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filtered.map((r, i) => (
              <div key={r.id} className="rule-card-3d" onClick={() => setExpanded(expanded === r.id ? null : r.id)} style={{
                borderRadius: 18, overflow: "hidden", cursor: "pointer",
                background: "linear-gradient(135deg,rgba(16,16,28,0.95),rgba(14,14,22,0.98))",
                border: "1px solid rgba(139,131,168,0.15)",
                boxShadow: "0 4px 20px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.03)",
                animation: `slideUp 0.4s ${0.05 * i}s both ease`,
              }}>
                {/* Colored top bar */}
                <div style={{ height: 3, background: `linear-gradient(90deg,${catColors[r.cat] || "#8B83A8"},transparent)` }} />
                <div style={{ padding: "16px 18px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ width: 40, height: 40, borderRadius: 12, background: "linear-gradient(135deg,rgba(91,75,138,0.4),rgba(139,131,168,0.25))", border: "1px solid rgba(139,131,168,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0, boxShadow: "0 3px 10px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.07)" }}>{r.ico}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <p style={{ fontSize: 14, fontWeight: 700, color: "#F0ECF9", margin: 0 }}>{r.title}</p>
                        <span style={{ fontSize: 10, background: "rgba(139,131,168,0.15)", color: "#8B83A8", padding: "2px 10px", borderRadius: 20, fontWeight: 700, border: "1px solid rgba(139,131,168,0.2)", letterSpacing: "0.3px" }}>{r.cat}</span>
                      </div>
                    </div>
                    <span style={{ color: "#8B83A8", fontSize: 16, transition: "transform 0.25s", transform: expanded === r.id ? "rotate(180deg)" : "rotate(0deg)", flexShrink: 0 }}>⌄</span>
                  </div>
                  {expanded === r.id && <p style={{ fontSize: 13, color: "#C5C0D8", margin: "14px 0 0", lineHeight: 1.8, paddingLeft: 52, animation: "fadeIn 0.25s ease" }}>{r.body}</p>}
                </div>
              </div>
            ))}
            {filtered.length === 0 && <div style={{ textAlign: "center", color: "#8B83A8", padding: 48 }}>
              <div style={{ fontSize: 32, marginBottom: 8, opacity: 0.35 }}>◉</div>No rules found.
            </div>}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       SERVICE REQUEST
    ══════════════════════════════════════ */
    function ServiceReq({ user, t, onRequestCreated, setNotifs }) {
      const [step, setStep] = useState(1);
      const [f, setF] = useState({ svc: "", desc: "", emergency: false });
      const [allProviders, setAllProviders] = useState([]);
      const [provPage, setProvPage] = useState(0);
      const [selectedProvider, setSelectedProvider] = useState(null);
      const [provLoad, setProvLoad] = useState(false);
      const [sub, setSub] = useState(false);
      const [tlLoad, setTlLoad] = useState(false);
      const [tld, setTld] = useState("");
      const [err, setErr] = useState("");
      const [imageData, setImageData] = useState("");
      const [imagePreview, setImagePreview] = useState("");
      const sv = k => v => setF(p => ({ ...p, [k]: v }));
      const est = f.svc ? PRICE[f.svc] : null;
      const steps = ["Service", "Details", "Choose Provider", "Done"];
      const PAGE_SIZE = 3;
      const pagedProviders = allProviders.slice(provPage * PAGE_SIZE, (provPage + 1) * PAGE_SIZE);
      const hasMore = (provPage + 1) * PAGE_SIZE < allProviders.length;
      const hasPrev = provPage > 0;

      const fetchProviders = async (svc) => {
        setProvLoad(true); setAllProviders([]); setSelectedProvider(null);
        try { const list = await API.getProviders(svc, user.society); setAllProviders(list || []); } catch { setAllProviders([]); }
        setProvLoad(false);
      };

      const translate = async () => { if (!f.desc) return; setTlLoad(true); const r = await ai(f.desc, "Translate to English. Return only the translation."); setTld(r); setTlLoad(false); };

      const go = async () => {
        setErr("");
        if (step === 1) { if (!f.svc) return; setStep(2); }
        else if (step === 2) {
          if (!f.desc) return;
          setProvPage(0);
          await fetchProviders(f.svc);
          setStep(3);
        }
        else if (step === 3) {
          setSub(true);
          try {
            const payload = { service_type: f.svc, description: f.desc, emergency: f.emergency ? 1 : 0 };
            if (selectedProvider) payload.preferred_provider_id = selectedProvider.id;
            if (imageData) payload.image_data = imageData;
            const req = await API.createRequest(payload);
            onRequestCreated(req);
            setNotifs(p => [{ id: Date.now(), type: "info", icon: "👷", title: "Request Submitted", message: `${f.svc} request submitted.`, time: "just now", read_flag: 0 }, ...p]);
            setStep(4);
          } catch (e) { setErr(e.message); }
          setSub(false);
        }
      };

      return (
        <div className="fade-in">
          <SH title="🛠️ Request Service" sub={`Submitting for: ${user.society || "your society"}`} t={t} />
          <div style={{ display: "flex", alignItems: "center", marginBottom: 26 }}>
            {steps.map((lbl, i) => (
              <React.Fragment key={i}>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                  <div style={{ width: 26, height: 26, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, background: i + 1 <= step ? "#8B83A8" : t.card, "#F0ECF9": t.muted, border: `1px solid ${i + 1 <= step ? "#8B83A8" : t.border}` }}>{i + 1 < step ? "✓" : i + 1}</div>
                  <span style={{ fontSize: 10, color: i + 1 === step ? "#8B83A8" : t.muted, fontWeight: i + 1 === step ? 700 : 400, whiteSpace: "nowrap" }}>{lbl}</span>
                </div>
                {i < 3 && <div style={{ flex: 1, height: 2, background: i + 1 < step ? "#8B83A8" : t.border, margin: "0 6px", marginBottom: 18 }} />}
              </React.Fragment>
            ))}
          </div>
          <ErrBox msg={err} t={t} />
          <Card t={t}>
            {step === 1 && <div>
              <p style={{ fontSize: 14, fontWeight: 600, color: t.txt, marginBottom: 14 }}>What service do you need?</p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                {["Plumber", "Electrician", "Cleaner", "Shifting"].map(s => (
                  <button key={s} onClick={() => sv("svc")(s)} style={{ padding: "14px 10px", borderRadius: 12, border: `2px solid ${f.svc === s ? SVC_COL[s] : t.border}`, background: f.svc === s ? SVC_COL[s] + "12" : "transparent", transition: "all 0.15s", textAlign: "center" }}>
                    <div style={{ fontSize: 26, marginBottom: 6 }}>{SVC_ICO[s]}</div>
                    <p style={{ fontSize: 13, fontWeight: 700, color: t.txt, margin: "0 0 3px" }}>{s}</p>
                    <p style={{ fontSize: 11, color: SVC_COL[s], margin: 0 }}>₹{PRICE[s][0]}–{PRICE[s][1]}/{UNIT[s]}</p>
                  </button>
                ))}
              </div>
              <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                <input type="checkbox" checked={f.emergency} onChange={e => sv("emergency")(e.target.checked)} style={{ width: 16, height: 16, accentColor: "#ef4444" }} />
                <span style={{ fontSize: 13, color: "#f87171", fontWeight: 600 }}>⚡ Emergency Request (Priority)</span>
              </label>
              <div style={{ display: "flex", justifyContent: "flex-end" }}><Btn onClick={go} disabled={!f.svc}>Next →</Btn></div>
            </div>}
            {step === 2 && <div>
              <p style={{ fontSize: 14, fontWeight: 600, color: t.txt, marginBottom: 12 }}>Describe your problem</p>
              <textarea value={f.desc} onChange={e => sv("desc")(e.target.value)} placeholder={`Describe your ${f.svc.toLowerCase()} issue…`}
                style={{ width: "100%", padding: "12px 14px", borderRadius: 10, border: `1px solid ${t.border}`, background: t.inp, color: t.txt, fontSize: 14, resize: "vertical", minHeight: 90, outline: "none", boxSizing: "border-box", fontFamily: "inherit" }} />
              <div style={{ display: "flex", gap: 8, margin: "10px 0" }}>
                <Btn v="ghost" sz="sm" onClick={translate} disabled={tlLoad || !f.desc}>{tlLoad ? "Translating…" : "🌐 Translate to English"}</Btn>
              </div>
              {tld && <div style={{ padding: "10px 12px", background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.2)", borderRadius: 8, marginBottom: 12 }}>
                <p style={{ fontSize: 11, color: "#818cf8", margin: "0 0 3px", fontWeight: 600 }}>🌐 English:</p>
                <p style={{ fontSize: 13, color: t.txt, margin: 0 }}>{tld}</p>
              </div>}

              {/* Photo upload */}
              <div style={{ marginBottom: 14 }}>
                <p style={{ fontSize: 13, fontWeight: 600, color: t.muted, marginBottom: 8 }}>📷 Add a Photo <span style={{ fontWeight: 400, color: "#4b5563" }}>(optional — helps provider understand the issue)</span></p>
                {!imagePreview && <label style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8, padding: "20px", border: `2px dashed ${t.border}`, borderRadius: 12, cursor: "pointer", background: "rgba(0,0,0,0.15)", transition: "border-color 0.2s" }}
                  onDragOver={e => { e.preventDefault(); }}
                  onDrop={e => { e.preventDefault(); const file = e.dataTransfer.files[0]; if (file && file.type.startsWith("image/")) { const r = new FileReader(); r.onload = ev => { setImagePreview(ev.target.result); setImageData(ev.target.result); }; r.readAsDataURL(file); } }}>
                  <span style={{ fontSize: 28 }}>📸</span>
                  <span style={{ fontSize: 13, color: t.muted }}>Tap to upload or drag &amp; drop</span>
                  <span style={{ fontSize: 11, color: "#4b5563" }}>JPG, PNG — max 2MB</span>
                  <input type="file" accept="image/*" style={{ display: "none" }} onChange={e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    if (file.size > 2 * 1024 * 1024) { alert("Image too large. Max 2MB."); return; }
                    const r = new FileReader();
                    r.onload = ev => { setImagePreview(ev.target.result); setImageData(ev.target.result); };
                    r.readAsDataURL(file);
                  }} />
                </label>}
                {imagePreview && <div style={{ position: "relative", display: "inline-block", width: "100%" }}>
                  <img src={imagePreview} alt="preview" style={{ width: "100%", maxHeight: 180, objectFit: "cover", borderRadius: 12, border: `1px solid ${t.border}` }} />
                  <button onClick={() => { setImagePreview(""); setImageData(""); }} style={{ position: "absolute", top: 8, right: 8, background: "rgba(239,68,68,0.85)", border: "none", borderRadius: "50%", width: 28, height: 28, color: "#fff", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>×</button>
                </div>}
              </div>

              <div style={{ display: "flex", gap: 10, justifyContent: "space-between" }}><Btn v="ghost" onClick={() => setStep(1)}>← Back</Btn><Btn onClick={go} disabled={!f.desc}>Find Providers →</Btn></div>
            </div>}
            {step === 3 && <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, margin: 0 }}>{provLoad ? "🔍 Finding providers…" : `${f.svc} Providers in your society`}</p>
                <button onClick={async () => { setProvPage(0); await fetchProviders(f.svc); }} disabled={provLoad}
                  style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 13px", borderRadius: 20, border: `1px solid ${t.border}`, background: t.hov, color: t.muted, fontSize: 12, fontWeight: 600 }}>
                  {provLoad ? "…" : "↻ Refresh"}
                </button>
              </div>

              {provLoad && <div style={{ textAlign: "center", padding: "28px 0", color: t.muted }}><p style={{ fontSize: 24, marginBottom: 8 }}>🔍</p><p style={{ fontSize: 13 }}>Looking for available providers…</p></div>}

              {!provLoad && allProviders.length === 0 && <div style={{ padding: "16px", background: "rgba(239,68,68,0.05)", border: "1px solid rgba(239,68,68,0.15)", borderRadius: 12, marginBottom: 14 }}>
                <p style={{ fontSize: 14, fontWeight: 700, color: "#f87171", margin: "0 0 5px" }}>⚠️ No Providers Available Right Now</p>
                <p style={{ color: t.muted, fontSize: 13, margin: 0 }}>No {f.svc} providers in {user.society} are currently available. Your request will be visible to all matching providers when they come online.</p>
              </div>}

              {!provLoad && pagedProviders.length > 0 && <>
                <p style={{ fontSize: 12, color: t.muted, marginBottom: 10 }}>
                  Showing {provPage * PAGE_SIZE + 1}–{Math.min((provPage + 1) * PAGE_SIZE, allProviders.length)} of {allProviders.length} provider{allProviders.length > 1 ? "s" : ""}
                  {selectedProvider ? <span style={{ color: "#10b981", fontWeight: 700, marginLeft: 8 }}>· Selected: {selectedProvider.name}</span> :
                    <span style={{ color: "#8B83A8", marginLeft: 8 }}>· Tap to select a provider</span>}
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 10 }}>
                  {pagedProviders.map(p => {
                    const isSel = selectedProvider && selectedProvider.id === p.id;
                    return (
                      <div key={p.id} onClick={() => setSelectedProvider(isSel ? null : p)}
                        style={{ padding: 14, borderRadius: 12, border: `2px solid ${isSel ? "#10b981" : t.border}`, background: isSel ? "rgba(16,185,129,0.07)" : t.hov, cursor: "pointer", transition: "all 0.15s" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                          <Av s={p.name || "P"} sz={44} col={isSel ? "#10b981" : "#8B83A8"} />
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 3 }}>
                              <p style={{ fontSize: 15, fontWeight: 700, color: t.txt, margin: 0 }}>{p.name}</p>
                              {isSel && <span style={{ background: "rgba(16,185,129,0.15)", color: "#10b981", fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 8 }}>SELECTED ✓</span>}
                            </div>
                            <p style={{ fontSize: 12, color: t.muted, margin: "0 0 4px" }}>{p.experience || "—"} exp · {p.jobs_done || 0} jobs done</p>
                            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                              <span style={{ fontSize: 13, color: "#8B83A8", fontWeight: 700 }}>₹{p.price_min}–{p.price_max}/{p.price_unit}</span>
                              <span style={{ display: "flex", alignItems: "center", gap: 3 }}>
                                {[1, 2, 3, 4, 5].map(i => <span key={i} style={{ fontSize: 12, color: i <= Math.round(p.rating || 0) ? "#8B83A8" : "rgba(255,255,255,0.15)" }}>★</span>)}
                                <span style={{ fontSize: 11, color: t.muted, marginLeft: 2 }}>{p.rating ? Number(p.rating).toFixed(1) : "New"}{p.reviews_count ? ` (${p.reviews_count})` : ""}</span>
                              </span>
                              <span style={{ background: "rgba(16,185,129,0.12)", color: "#10b981", fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 7 }}>Available ✓</span>
                            </div>
                          </div>
                        </div>
                        {p.skill && p.skill.includes(",") && <div style={{ marginTop: 9, display: "flex", gap: 5, flexWrap: "wrap" }}>
                          {p.skill.split(",").map(sk => sk.trim()).filter(Boolean).map(sk => (
                            <span key={sk} style={{ fontSize: 10, background: (SVC_COL[sk] || "#666") + "22", color: SVC_COL[sk] || "#888", padding: "2px 8px", borderRadius: 6, fontWeight: 700 }}>{SVC_ICO[sk] || "🔧"} {sk}</span>
                          ))}
                        </div>}
                      </div>
                    );
                  })}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <button onClick={() => setProvPage(p => p - 1)} disabled={!hasPrev}
                    style={{ padding: "7px 16px", borderRadius: 20, border: `1px solid ${t.border}`, background: t.hov, color: hasPrev ? t.muted : "#333", fontSize: 12, fontWeight: 600, opacity: hasPrev ? 1 : 0.3 }}>← Prev</button>
                  <span style={{ fontSize: 12, color: t.muted }}>{provPage + 1} / {Math.ceil(allProviders.length / PAGE_SIZE)}</span>
                  <button onClick={() => setProvPage(p => p + 1)} disabled={!hasMore}
                    style={{ padding: "7px 16px", borderRadius: 20, border: `1px solid ${t.border}`, background: t.hov, color: hasMore ? t.muted : "#333", fontSize: 12, fontWeight: 600, opacity: hasMore ? 1 : 0.3 }}>Next →</button>
                </div>
              </>}

              <div style={{ padding: "11px 13px", background: t.hov, borderRadius: 10, marginBottom: 14 }}>
                <p style={{ fontSize: 12, color: t.muted, margin: "0 0 3px" }}>📋 Request Summary</p>
                <p style={{ fontSize: 14, fontWeight: 600, color: t.txt, margin: 0 }}>{f.svc} {f.emergency ? "⚡" : ""}</p>
                <p style={{ fontSize: 13, color: t.muted, margin: "3px 0 0" }}>{f.desc}</p>
                {est && <p style={{ fontSize: 12, color: "#8B83A8", margin: "4px 0 0", fontWeight: 600 }}>Est: ₹{est[0]}–{est[1]}/{UNIT[f.svc]}</p>}
                {selectedProvider ? <p style={{ fontSize: 12, color: "#10b981", margin: "4px 0 0", fontWeight: 600 }}>Provider: {selectedProvider.name}</p> :
                  <p style={{ fontSize: 12, color: t.muted, margin: "4px 0 0" }}>Provider: Auto-assigned (best available)</p>}
              </div>
              <div style={{ display: "flex", gap: 10, justifyContent: "space-between" }}>
                <Btn v="ghost" onClick={() => setStep(2)}>← Back</Btn>
                <Btn onClick={go} disabled={sub}>{sub ? "Submitting…" : "Confirm Request ✓"}</Btn>
              </div>
            </div>}
            {step === 4 && <div style={{ textAlign: "center", padding: "22px 0" }}>
              <div style={{ fontSize: 50, marginBottom: 12 }}>🎉</div>
              <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22, color: t.txt, marginBottom: 8 }}>Request Submitted!</h3>
              <p style={{ color: t.muted, fontSize: 14, marginBottom: 20 }}>Providers in {user.society} will see your request and can accept it.</p>
              <Btn onClick={() => { setStep(1); setF({ svc: "", desc: "", emergency: false }); setAllProviders([]); setSelectedProvider(null); setProvPage(0); setTld(""); }}>New Request</Btn>
            </div>}
          </Card>
        </div>
      );
    }

    /* ══════════════════════════════════════
       CHAT
    ══════════════════════════════════════ */
    function ChatView({ t, user, reqs }) {
      const [selReq, setSelReq] = useState(null);
      const [msgs, setMsgs] = useState([]);
      const [inp, setInp] = useState("");
      const [loading, setLoading] = useState(false);
      const endRef = useRef(null);
      useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);
      const activeReqs = reqs.filter(r => r.status !== "Completed");
      const loadMsgs = async (reqId) => { setLoading(true); try { setMsgs(await API.getMessages(reqId)); } catch { setMsgs([]); } setLoading(false); };
      const selectReq = (req) => { setSelReq(req); loadMsgs(req.id); };
      const send = async () => {
        if (!inp.trim() || !selReq) return;
        const text = inp; setInp("");
        try { const m = await API.sendMessage({ request_id: selReq.id, content: text }); setMsgs(p => [...p, m]); } catch { setInp(text); }
      };
      if (!selReq) return (
        <div className="fade-in">
          <SH title="💬 Chat" sub="Select an active request to chat" t={t} />
          {activeReqs.length === 0 ? <Card t={t}><p style={{ color: t.muted, fontSize: 14, textAlign: "center", padding: "30px 0" }}>No active requests. Submit a service request to start chatting.</p></Card>
            : activeReqs.map(r => (
              <Card key={r.id} t={t} style={{ marginBottom: 10 }} onClick={() => selectReq(r)}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 38, height: 38, borderRadius: 10, background: (SVC_COL[r.service_type] || "#666") + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{SVC_ICO[r.service_type] || "🔧"}</div>
                  <div style={{ flex: 1 }}><p style={{ fontSize: 13, fontWeight: 600, color: t.txt, margin: 0 }}>{r.service_type} Request</p><p style={{ fontSize: 11, color: t.muted, margin: "2px 0 0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.description}</p></div>
                  <Badge s={r.status} />
                </div>
              </Card>
            ))
          }
        </div>
      );
      return (
        <div className="fade-in">
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
            <button onClick={() => setSelReq(null)} style={{ background: "none", border: "none", color: t.muted, fontSize: 20, padding: "2px 6px 2px 0" }}>←</button>
            <div><h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 20, color: t.txt, margin: 0 }}>{selReq.service_type} Chat</h2><p style={{ color: t.muted, fontSize: 12, marginTop: 2 }}>{selReq.description}</p></div>
          </div>
          <Card t={t} style={{ padding: 0, overflow: "hidden" }}>
            <div style={{ padding: "11px 14px", borderBottom: `1px solid ${t.border}` }}><Badge s={selReq.status} /></div>
            <div style={{ padding: 14, display: "flex", flexDirection: "column", gap: 10, minHeight: 220, maxHeight: 340, overflowY: "auto" }}>
              {loading && <p style={{ color: t.muted, fontSize: 13, textAlign: "center" }}>Loading…</p>}
              {!loading && msgs.length === 0 && <p style={{ color: t.muted, fontSize: 13, textAlign: "center", padding: "20px 0" }}>No messages yet.</p>}
              {msgs.map(m => {
                const mine = m.sender_id === user.id; return (
                  <div key={m.id} style={{ display: "flex", flexDirection: "column", alignItems: mine ? "flex-end" : "flex-start" }}>
                    <div style={{ maxWidth: "72%", background: mine ? "#8B83A8" : t.card2, border: mine ? "none" : `1px solid ${t.border}`, borderRadius: mine ? "16px 4px 16px 16px" : "4px 16px 16px 16px", padding: "9px 13px" }}>
                      <p style={{ fontSize: 13, "#F0ECF9": t.txt, margin: 0, lineHeight: 1.5 }}>{m.content}</p>
                    </div>
                    <p style={{ fontSize: 10, color: t.muted, margin: "3px 0 0" }}>{m.sender_name || "You"} · {m.created_at}</p>
                  </div>
                );
              })}
              <div ref={endRef} />
            </div>
            <div style={{ padding: "10px 12px", borderTop: `1px solid ${t.border}`, display: "flex", gap: 8 }}>
              <input value={inp} onChange={e => setInp(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="Type a message…"
                style={{ flex: 1, padding: "9px 14px", borderRadius: 22, border: `1px solid ${t.border}`, background: t.inp, color: t.txt, fontSize: 13, outline: "none" }} />
              <button onClick={send} style={{ width: 38, height: 38, borderRadius: "50%", border: "none", background: "#8B83A8", fontSize: 16 }}>→</button>
            </div>
          </Card>
        </div>
      );
    }

    /* ══════════════════════════════════════
       RATING MODAL — star rating after job completion
    ══════════════════════════════════════ */
    function RatingModal({ req, onClose, onDone, t }) {
      const [stars, setStars] = useState(0);
      const [hovered, setHovered] = useState(0);
      const [comment, setComment] = useState("");
      const [load, setLoad] = useState(false);
      const [err, setErr] = useState("");

      const LABELS = ["", "Terrible", "Poor", "Okay", "Good", "Excellent!"];
      const COLORS = ["", "#ef4444", "#5B4B8A", "#eab308", "#84cc16", "#10b981"];

      const submit = async () => {
        if (!stars) { setErr("Please select a rating."); return; }
        setLoad(true); setErr("");
        try {
          await API.submitRating({
            request_id: req.id,
            provider_id: req.provider_id,
            rating: stars,
            comment: comment.trim()
          });
          onDone(req.id, stars);
          onClose();
        } catch (e) { setErr(e.message); }
        setLoad(false);
      };

      return (
        <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-box" style={{ maxWidth: 400 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
              <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 20, color: "#e6edf3", margin: 0 }}>⭐ Rate Your Experience</h3>
              <button onClick={onClose} style={{ background: "none", border: "none", color: "#7d8590", fontSize: 22, lineHeight: 1 }}>×</button>
            </div>

            {/* Provider info */}
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 13px", background: "rgba(245,158,11,0.06)", border: "1px solid rgba(245,158,11,0.15)", borderRadius: 11, marginBottom: 18 }}>
              <Av s={req.provider_name || "P"} sz={38} />
              <div>
                <p style={{ fontSize: 14, fontWeight: 700, color: "#e6edf3", margin: 0 }}>{req.provider_name || "Provider"}</p>
                <p style={{ fontSize: 12, color: "#7d8590", margin: "2px 0 0" }}>{req.service_type} · {req.created_at}</p>
              </div>
            </div>

            {/* Star selector */}
            <p style={{ fontSize: 13, color: "#7d8590", marginBottom: 10, textAlign: "center" }}>How was the service?</p>
            <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 8 }}>
              {[1, 2, 3, 4, 5].map(s => (
                <button key={s}
                  onMouseEnter={() => setHovered(s)}
                  onMouseLeave={() => setHovered(0)}
                  onClick={() => setStars(s)}
                  style={{
                    background: "none", border: "none", fontSize: 36,
                    color: (hovered || stars) >= s ? (COLORS[hovered || stars] || "#8B83A8") : "rgba(255,255,255,0.12)",
                    transform: (hovered || stars) >= s ? "scale(1.18)" : "scale(1)",
                    transition: "all 0.15s", cursor: "pointer", padding: "0 2px"
                  }}>★</button>
              ))}
            </div>
            {(hovered || stars) > 0 && <p style={{ textAlign: "center", fontSize: 14, fontWeight: 700, color: COLORS[hovered || stars] || "#8B83A8", marginBottom: 14, animation: "fadeIn 0.2s" }}>{LABELS[hovered || stars]}</p>}
            {!(hovered || stars) && <div style={{ height: 22, marginBottom: 14 }} />}

            {/* Comment */}
            <textarea value={comment} onChange={e => setComment(e.target.value)}
              placeholder="Leave a comment (optional)…"
              style={{ width: "100%", padding: "10px 13px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(0,0,0,0.3)", color: "#e6edf3", fontSize: 13, resize: "vertical", minHeight: 70, boxSizing: "border-box", fontFamily: "inherit", outline: "none", marginBottom: 12 }} />

            {err && <div style={{ fontSize: 12, color: "#f87171", marginBottom: 10, textAlign: "center" }}>{err}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              <Btn v="ghost" onClick={onClose} style={{ flex: 1 }}>Skip</Btn>
              <button onClick={submit} disabled={load || !stars}
                style={{
                  flex: 2, padding: "11px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700,
                  background: stars ? "linear-gradient(135deg,#5B4B8A,#8B83A8)" : "rgba(100,100,100,0.3)",
                  "#C5C0D8": "#666", transition: "all 0.15s"
                }}>
                {load ? "Submitting…" : "Submit Rating ⭐"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       HISTORY
    ══════════════════════════════════════ */
    function History({ t, reqs, onRefresh, user }) {
      const [filter, setFilter] = useState("All");
      const [otpData, setOtpData] = useState({});
      const [otpLoading, setOtpLoading] = useState({});
      const [actionLoading, setActionLoading] = useState({});
      const [localReqs, setLocalReqs] = useState(reqs);
      const [confirmCancel, setConfirmCancel] = useState(null);
      const [ratingReq, setRatingReq] = useState(null);  // req to rate
      const [ratedIds, setRatedIds] = useState({});       // reqId → star value (already rated)
      const { toasts, err, ok } = useToast();

      useEffect(() => setLocalReqs(reqs), [reqs]);

      // Load already-rated IDs on mount
      useEffect(() => {
        localReqs.filter(r => r.status === "Completed" && r.provider_id).forEach(async r => {
          try {
            const res = await API.checkMyRating(r.id);
            if (res && res.rating) setRatedIds(p => ({ ...p, [r.id]: res.rating }));
          } catch { }
        });
      }, []);

      const fl = filter === "All" ? localReqs : localReqs.filter(r => r.status === filter);

      const generateOtp = async (reqId) => {
        setOtpLoading(p => ({ ...p, [reqId]: true }));
        try {
          const res = await API.generateOtp(reqId);
          setOtpData(p => ({ ...p, [reqId]: res.otp }));
        } catch (e) { err(e.message); }
        setOtpLoading(p => ({ ...p, [reqId]: false }));
      };

      const cancelRequest = async (req) => {
        setConfirmCancel(req);
      };

      const doCancel = async () => {
        const req = confirmCancel;
        setConfirmCancel(null);
        setActionLoading(p => ({ ...p, [req.id]: "cancel" }));
        try {
          await API.cancelReq(req.id);
          setLocalReqs(p => p.map(r => r.id === req.id ? { ...r, status: "Cancelled" } : r));
          ok("Request cancelled.");
        } catch (e) { err(e.message); }
        setActionLoading(p => ({ ...p, [req.id]: undefined }));
      };

      const startWork = async (req) => {
        setActionLoading(p => ({ ...p, [req.id]: "start" }));
        try {
          const updated = await API.startWork(req.id);
          setLocalReqs(p => p.map(r => r.id === req.id ? { ...r, ...updated } : r));
          ok("Work started!");
        } catch (e) { err(e.message); }
        setActionLoading(p => ({ ...p, [req.id]: undefined }));
      };

      const STATUS_ICONS = { "On the way": "🚗", "Coming": "🚶", "Reached": "📍", "Arrived": "🏠", "In Progress": "⚙️", "Completed": "✅", "Pending": "⏳", "Declined": "❌", "Cancelled": "❌", "Accepted": "✅" };

      return (
        <div className="fade-in">
          <Toast toasts={toasts} />
          {ratingReq && <RatingModal req={ratingReq} onClose={() => setRatingReq(null)}
            onDone={(reqId, stars) => { setRatedIds(p => ({ ...p, [reqId]: stars })); ok(`Thanks! You gave ${stars}⭐`); }}
            t={t} />}
          {confirmCancel && <ConfirmModal
            msg={`Cancel ${confirmCancel.service_type} request?`}
            subMsg="This will cancel your request. You can submit a new one anytime."
            confirmLabel="Yes, Cancel"
            onConfirm={doCancel}
            onCancel={() => setConfirmCancel(null)}
          />}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <SH title="📊 Service History" sub={`${localReqs.length} total requests`} t={t} />
            <button onClick={onRefresh} style={{ background: "none", border: `1px solid ${t.border}`, color: t.muted, padding: "6px 12px", borderRadius: 8, fontSize: 12 }}>↻ Refresh</button>
          </div>
          <div style={{ display: "flex", gap: 7, marginBottom: 14, flexWrap: "wrap" }}>
            {["All", "Pending", "Accepted", "On the way", "Coming", "Reached", "In Progress", "Completed", "Cancelled"].map(s => (
              <button key={s} onClick={() => setFilter(s)} style={{ padding: "5px 13px", borderRadius: 20, border: `1.5px solid ${filter === s ? t.accent : t.border}`, fontSize: 12, fontWeight: 600, background: filter === s ? t.accent : "transparent", color: filter === s ? "#ffffff" : t.muted, transition: "all 0.15s" }}>{s}</button>
            ))}
          </div>
          {fl.length === 0 ? <p style={{ textAlign: "center", color: t.muted, padding: 40 }}>No requests found.</p>
            : fl.map(r => {
              const isActive = ["Accepted", "On the way", "Coming", "Reached", "Arrived", "In Progress"].includes(r.status);
              const canCancel = user.role === "customer" && !["In Progress", "Completed", "Cancelled", "Declined"].includes(r.status);
              const canStartWork = user.role === "customer" && ["Accepted", "On the way", "Coming", "Reached", "Arrived"].includes(r.status);
              const otp = otpData[r.id];
              const al = actionLoading[r.id];
              return (
                <Card key={r.id} t={t} style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                    <div style={{ width: 38, height: 38, borderRadius: 10, background: (SVC_COL[r.service_type] || "#666") + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>{SVC_ICO[r.service_type] || "🔧"}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 5 }}>
                        <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, margin: 0 }}>{r.service_type} {r.emergency ? "⚡" : ""}</p>
                        <Badge s={r.status} />
                      </div>
                      <p style={{ fontSize: 13, color: t.muted, margin: "0 0 4px" }}>{r.description}</p>
                      <p style={{ fontSize: 11, color: t.muted, margin: "0 0 6px" }}>{r.created_at} · {r.cost || "TBD"}</p>
                      {r.image_data && <div style={{ marginBottom: 8 }}>
                        <img src={r.image_data} alt="issue" style={{ width: "100%", maxHeight: 160, objectFit: "cover", borderRadius: 10, border: `1px solid ${t.border}` }} />
                      </div>}
                      {r.provider_name && <p style={{ fontSize: 12, color: "#8B83A8", margin: "0 0 8px", fontWeight: 600 }}>👷 Provider: {r.provider_name}</p>}

                      {/* Provider location status banner */}
                      {isActive && r.status !== "In Progress" && (
                        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 11px", background: "rgba(139,92,246,0.07)", border: "1px solid rgba(139,92,246,0.2)", borderRadius: 9, marginBottom: 8 }}>
                          <span style={{ fontSize: 18 }}>{STATUS_ICONS[r.status] || "📡"}</span>
                          <div>
                            <p style={{ fontSize: 12, fontWeight: 700, color: "#60a5fa", margin: 0 }}>Provider Update</p>
                            <p style={{ fontSize: 12, color: t.muted, margin: 0 }}>{
