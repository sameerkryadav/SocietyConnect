const API={
  base:()=>localStorage.getItem("sc_url")||"https://societyconnect-knct.onrender.com",
  token:()=>localStorage.getItem("sc_token"),
  headers(){
    const h={"Content-Type":"application/json"};
    const t=this.token();
    if(t)h["Authorization"]=`Bearer ${t}`;
    return h;
  },
  async call(path,opts={}){
    try{
      const r=await fetch(this.base()+path,{...opts,headers:{...this.headers(),...(opts.headers||{})}});
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||"Server error");
      return d;
    }catch(e){
      if(e.message==="Failed to fetch"||e.name==="TypeError"){
        throw new Error("Cannot reach server.");
      }
      throw e;
    }
  },
  login:(e,p)=>API.call("/api/auth/login",{method:"POST",body:JSON.stringify({email:e,password:p})}),

function useToast(){
  const [toasts,setToasts]=useState([]);
  const show=(msg,type="error")=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3200);
  };
  const err=(msg)=>show(msg,"error");
  const ok=(msg)=>show(msg,"ok");
  return {toasts,err,ok,show};
}

      const r=await API.forgotPw(email);
      setUserId(r.user_id);
      if(r.otp)setDevOtp(r.otp); // dev mode: no email configured
      setMsg(r.email_sent?"OTP sent to your email! Check inbox.":"OTP generated (email not configured).");
      setStep(2);
    }catch(e){setErr(e.message);}
    setLoad(false);
  };

  const doReset=async()=>{
    if(!otp||!newPw){setErr("Enter the OTP and new password.");return;}
    if(newPw.length<6){setErr("Password must be at least 6 characters.");return;}
    setLoad(true);setErr("");
    try{
      await API.forgotVerifyOtp(userId,otp,newPw);
      setMsg("✅ Password reset! You can now log in.");
      setTimeout(onClose,1800);
    }catch(e){setErr(e.message);}
    setLoad(false);
  };

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e6edf3",margin:0}}>🔑 Reset Password</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#7d8590",fontSize:22,lineHeight:1}}>×</button>
        </div>
        <ErrBox msg={err} t={{border:""}}/>
        <OkBox msg={msg} t={{border:""}}/>
        {step===1&&<>
          <p style={{fontSize:13,color:"#7d8590",marginBottom:12}}>Enter your registered email. A 6-digit OTP will be sent to it.</p>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address" onKeyDown={e=>e.key==="Enter"&&requestOtp()}
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(0,0,0,0.3)",color:"#e6edf3",fontSize:14,boxSizing:"border-box",marginBottom:12}}/>
          <Btn onClick={requestOtp} disabled={load} full>{load?"Sending OTP…":"Send OTP →"}</Btn>
        </>}
        {step===2&&<>
          <p style={{fontSize:13,color:"#7d8590",marginBottom:4}}>Enter the 6-digit OTP sent to <b style={{color:"#f59e0b"}}>{email}</b> and your new password.</p>
          {devOtp&&<div style={{padding:"8px 12px",background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:8,fontSize:12,color:"#f59e0b",marginBottom:10}}>
            ⚠️ Email not configured — your OTP is: <b style={{letterSpacing:3,fontSize:16}}>{devOtp}</b>
          </div>}
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            {[0,1,2,3,4,5].map(i=>(
              <input key={i} id={`fotp${i}`} type="text" inputMode="numeric" maxLength={1} value={otp[i]||""}
                onChange={e=>{
                  const v=e.target.value.replace(/\D/g,"");
                  const arr=otp.split("");
                  arr[i]=v;
                  const joined=arr.join("").slice(0,6);
                  setOtp(joined);
                  if(v&&i<5)document.getElementById(`fotp${i+1}`)?.focus();
                }}
                onKeyDown={e=>{if(e.key==="Backspace"&&!otp[i]&&i>0)document.getElementById(`fotp${i-1}`)?.focus();}}
                style={{flex:1,padding:"12px 0",textAlign:"center",fontSize:20,fontWeight:700,borderRadius:10,border:`1px solid ${otp[i]?"#f59e0b":"rgba(255,255,255,0.1)"}`,background:"rgba(0,0,0,0.3)",color:"#f59e0b",fontFamily:"monospace"}}/>
            ))}
          </div>
          <PwInput value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="New Password (min 6 chars)" t={{border:"rgba(255,255,255,0.1)"}}/>
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <Btn v="ghost" onClick={()=>{setStep(1);setOtp("");setDevOtp("");setErr("");setMsg("");}}>← Back</Btn>
            <Btn onClick={doReset} disabled={load||otp.length<6} full>{load?"Verifying…":"Reset Password ✓"}</Btn>
          </div>
        </>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   AUTH PAGE
══════════════════════════════════════ */
function Auth({onLogin}){
  const [mode,setMode]=useState("login");
  const [showForgot,setShowForgot]=useState(false);
  const [flipping,setFlipping]=useState(false);
  // OTP login state
  const [otpStep,setOtpStep]=useState(false);
  const [pendingUserId,setPendingUserId]=useState(null);
  const [loginOtp,setLoginOtp]=useState("");
  const [devOtp,setDevOtp]=useState("");
  // OTP signup state
  const [signupOtpStep,setSignupOtpStep]=useState(false);
  const [signupSessionKey,setSignupSessionKey]=useState(null);
  const [signupOtp,setSignupOtp]=useState("");
  const [signupDevOtp,setSignupDevOtp]=useState("");
  const [f,setF]=useState({name:"",email:"",pass:"",phone:"",role:"customer",skill:"",society:"Shapoorji Complex, New Town",exp:""});
  const sv=(k,v)=>setF(p=>({...p,[k]:v}));
  const [err,setErr]=useState("");
  const [load,setLoad]=useState(false);

  const switchMode=(newMode)=>{
    if(newMode===mode||flipping)return;
    setFlipping(true);
    setTimeout(()=>{setMode(newMode);setErr("");},280);
    setTimeout(()=>setFlipping(false),560);
  };
  const t={border:"rgba(255,255,255,0.1)",inp:"rgba(0,0,0,0.3)",txt:"#e6edf3",muted:"#6b7280"};
  const IS={width:"100%",padding:"11px 14px",borderRadius:11,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(0,0,0,0.3)",color:"#e6edf3",fontSize:14,boxSizing:"border-box",fontFamily:"inherit"};

  const validate=()=>{
    if(mode==="login"){
      if(!f.email)return "Email is required.";
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(f.email))return "Enter a valid email address.";
      if(!f.pass)return "Password is required.";
      return null;
    }
    if(!f.name.trim())return "Full name is required.";
    if(!f.email||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(f.email))return "Enter a valid email address.";
    if(!f.pass||f.pass.length<6)return "Password must be at least 6 characters.";
    if(!f.phone||f.phone.replace(/\D/g,"").length<10)return "Enter a valid 10-digit phone number.";
    if(f.role==="provider"&&!f.skill)return "Please select your skill.";
    if(!f.society)return "Please select your society.";
    return null;
  };

  const submit=async()=>{
    const e=validate();
    if(e){setErr(e);return;}
    setLoad(true);setErr("");
    try{
      if(mode==="login"){
        const r=await API.login(f.email,f.pass);
        if(r.otp_required){
          setPendingUserId(r.user_id);
          if(r.otp)setDevOtp(r.otp);
          setOtpStep(true);
        } else {
          // fallback direct login (shouldn't happen with new backend)
          localStorage.setItem("sc_token",r.token);
          onLogin(r.user);
        }
      }else{
        const r=await API.signupSendOtp({
          name:f.name,email:f.email,password:f.pass,
          phone:f.phone.replace(/\D/g,""),
          role:f.role,skill:f.role==="provider"?f.skill:"",
          society:f.society,experience:f.exp||""
        });
        setSignupSessionKey(r.session_key);
        if(r.otp)setSignupDevOtp(r.otp);
        setSignupOtpStep(true);
      }
    }catch(e){setErr(e.message);}
    setLoad(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(150deg,#0d1117 0%,#0f172a 60%,#0a0e1a 100%)",padding:20}}>
      {showForgot&&<ForgotPasswordModal onClose={()=>setShowForgot(false)} t={t}/>}
      <div style={{width:"100%",maxWidth:440}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{display:"inline-flex",width:62,height:62,borderRadius:20,background:"linear-gradient(135deg,#f59e0b,#b45309)",alignItems:"center",justifyContent:"center",fontSize:28,marginBottom:14}}>🏙️</div>
          <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:28,color:"#e6edf3",margin:0}}>SocietyConnect</h1>
          <p style={{color:"#4b5563",fontSize:13,marginTop:4}}>Your community, connected &amp; smarter</p>
        </div>

        <div style={{perspective:"1200px"}}>
        <div style={{background:"rgba(22,27,34,0.97)",borderRadius:22,border:"1px solid rgba(255,255,255,0.07)",padding:26,transition:"transform 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease",transform:flipping?"rotateY(90deg) scale(0.96)":"rotateY(0deg) scale(1)",opacity:flipping?0:1,willChange:"transform,opacity"}}>

          {/* LOGIN OTP VERIFICATION STEP */}
          {otpStep&&<div className="fade-in">
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:36,marginBottom:8}}>📧</div>
              <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e6edf3",margin:"0 0 6px"}}>Verify Your Identity</h3>
              <p style={{fontSize:13,color:"#7d8590"}}>Enter the 6-digit OTP sent to <b style={{color:"#f59e0b"}}>{f.email}</b></p>
            </div>
            {devOtp&&<div style={{padding:"8px 12px",background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:8,fontSize:12,color:"#f59e0b",marginBottom:10,textAlign:"center"}}>
              ⚠️ Email not configured — OTP: <b style={{letterSpacing:3,fontSize:16}}>{devOtp}</b>
            </div>}
            {err&&<ErrBox msg={err} t={t}/>}
            <div style={{display:"flex",gap:8,marginBottom:16,justifyContent:"center"}}>
              {[0,1,2,3,4,5].map(i=>(
                <input key={i} id={`lotp${i}`} type="text" inputMode="numeric" maxLength={1} value={loginOtp[i]||""}
                  onChange={e=>{
                    const v=e.target.value.replace(/\D/g,"");
                    const arr=loginOtp.split("");
                    arr[i]=v;
                    const joined=arr.join("").slice(0,6);
                    setLoginOtp(joined);
                    if(v&&i<5)document.getElementById(`lotp${i+1}`)?.focus();
                    if(joined.length===6){
                      setLoad(true);setErr("");
                      API.loginVerifyOtp(pendingUserId,joined).then(r=>{
                        localStorage.setItem("sc_token",r.token);onLogin(r.user);
                      }).catch(e=>{setErr(e.message);setLoad(false);});
                    }
                  }}
                  onPaste={e=>{
                    e.preventDefault();
                    const pasted=e.clipboardData.getData("text").replace(/\D/g,"").slice(0,6);
                    if(!pasted)return;
                    setLoginOtp(pasted);
                    for(let k=0;k<6;k++){const el=document.getElementById(`lotp${k}`);if(el)el.value=pasted[k]||"";}
                    document.getElementById(`lotp${Math.min(pasted.length,5)}`)?.focus();
                    if(pasted.length===6){
                      setLoad(true);setErr("");
                      API.loginVerifyOtp(pendingUserId,pasted).then(r=>{
                        localStorage.setItem("sc_token",r.token);onLogin(r.user);
                      }).catch(e=>{setErr(e.message);setLoad(false);});
                    }
                  }}
                  onKeyDown={e=>{if(e.key==="Backspace"&&!loginOtp[i]&&i>0)document.getElementById(`lotp${i-1}`)?.focus();}}
                  style={{width:42,height:52,textAlign:"center",fontSize:22,fontWeight:700,borderRadius:10,border:`1px solid ${loginOtp[i]?"#f59e0b":"rgba(255,255,255,0.1)"}`,background:"rgba(0,0,0,0.3)",color:"#f59e0b",fontFamily:"monospace"}}/>
              ))}
            </div>
            <Btn onClick={async()=>{
              setLoad(true);setErr("");
              try{const r=await API.loginVerifyOtp(pendingUserId,loginOtp);localStorage.setItem("sc_token",r.token);onLogin(r.user);}
              catch(e){setErr(e.message);}
              setLoad(false);
            }} disabled={load||loginOtp.length<6} full>{load?"Verifying…":"Confirm OTP →"}</Btn>
            <button onClick={()=>{setOtpStep(false);setLoginOtp("");setDevOtp("");setErr("");}} style={{width:"100%",marginTop:10,background:"none",border:"none",color:"#7d8590",fontSize:12,cursor:"pointer"}}>← Back to Sign In</button>
          </div>}

          {signupOtpStep&&<div className="fade-in">
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:36,marginBottom:8}}>✉️</div>
              <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#e6edf3",margin:"0 0 6px"}}>Verify Your Email</h3>
              <p style={{fontSize:13,color:"#7d8590",lineHeight:1.6}}>We sent a 6-digit OTP to<br/><b style={{color:"#f59e0b"}}>{f.email}</b><br/><span style={{color:"#4b5563",fontSize:12}}>Enter it below to activate your account.</span></p>
            </div>
            {signupDevOtp&&<div style={{padding:"8px 12px",background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:8,fontSize:12,color:"#f59e0b",marginBottom:10,textAlign:"center"}}>
              ⚠️ Email not configured — OTP: <b style={{letterSpacing:3,fontSize:16}}>{signupDevOtp}</b>
            </div>}
            {err&&<ErrBox msg={err} t={t}/>}
            <div style={{display:"flex",gap:8,marginBottom:16,justifyContent:"center"}}>
              {[0,1,2,3,4,5].map(i=>(
                <input key={i} id={`sotp${i}`} type="text" inputMode="numeric" maxLength={1} value={signupOtp[i]||""}
                  onChange={e=>{
                    const v=e.target.value.replace(/\D/g,"");
                    const arr=signupOtp.split("");
                    arr[i]=v;
                    const joined=arr.join("").slice(0,6);
                    setSignupOtp(joined);
                    if(v&&i<5)document.getElementById(`sotp${i+1}`)?.focus();
                    if(joined.length===6){
                      if(joined!==signupSessionKey){setErr("Incorrect OTP. Please try again.");return;}
                      setLoad(true);setErr("");
                      API.signup({name:f.name,email:f.email,password:f.pass,phone:f.phone.replace(/\D/g,""),role:f.role,skill:f.role==="provider"?f.skill:"",society:f.society,experience:f.exp||""}).then(r=>{
                        localStorage.setItem("sc_token",r.token);onLogin(r.user);
                      }).catch(e=>{setErr(e.message);setLoad(false);});
                    }
                  }}
                  onPaste={e=>{
                    e.preventDefault();
                    const pasted=e.clipboardData.getData("text").replace(/\D/g,"").slice(0,6);
                    if(!pasted)return;
                    setSignupOtp(pasted);
                    // fill all visible boxes then focus last filled
                    for(let k=0;k<6;k++){const el=document.getElementById(`sotp${k}`);if(el)el.value=pasted[k]||"";}
                    const nextEmpty=pasted.length<6?pasted.length:5;
                    document.getElementById(`sotp${nextEmpty}`)?.focus();
                    if(pasted.length===6){
                      if(pasted!==signupSessionKey){setErr("Incorrect OTP. Please try again.");return;}
                      setLoad(true);setErr("");
                      API.signup({name:f.name,email:f.email,password:f.pass,phone:f.phone.replace(/\D/g,""),role:f.role,skill:f.role==="provider"?f.skill:"",society:f.society,experience:f.exp||""}).then(r=>{
                        localStorage.setItem("sc_token",r.token);onLogin(r.user);
                      }).catch(e=>{setErr(e.message);setLoad(false);});
                    }
                  }}
                  onKeyDown={e=>{if(e.key==="Backspace"&&!signupOtp[i]&&i>0)document.getElementById(`sotp${i-1}`)?.focus();}}
                  style={{width:42,height:52,textAlign:"center",fontSize:22,fontWeight:700,borderRadius:10,border:`1px solid ${signupOtp[i]?"#f59e0b":"rgba(255,255,255,0.1)"}`,background:"rgba(0,0,0,0.3)",color:"#f59e0b",fontFamily:"monospace"}}/>
              ))}
            </div>
            <Btn onClick={async()=>{
              if(signupOtp!==signupSessionKey){setErr("Incorrect OTP. Please try again.");return;}
              setLoad(true);setErr("");
              try{
                const r=await API.signup({name:f.name,email:f.email,password:f.pass,phone:f.phone.replace(/\D/g,""),role:f.role,skill:f.role==="provider"?f.skill:"",society:f.society,experience:f.exp||""});
                localStorage.setItem("sc_token",r.token);onLogin(r.user);
              }catch(e){setErr(e.message);}
              setLoad(false);
            }} disabled={load||signupOtp.length<6} full>{load?"Creating Account…":"Verify & Create Account ✓"}</Btn>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10}}>
              <button onClick={()=>{setSignupOtpStep(false);setSignupOtp("");setSignupDevOtp("");setSignupSessionKey(null);setErr("");}} style={{background:"none",border:"none",color:"#7d8590",fontSize:12,cursor:"pointer"}}>← Back</button>
              <button onClick={async()=>{
                setErr("");setSignupOtp("");
                const newOtp=String(Math.floor(100000+Math.random()*900000));
                const svcId=window.EMAILJS_SERVICE_ID,tplId=window.EMAILJS_TEMPLATE_ID,pubKey=window.EMAILJS_PUBLIC_KEY;
                const ejsOk=svcId!=="YOUR_SERVICE_ID"&&tplId!=="YOUR_TEMPLATE_ID"&&pubKey!=="YOUR_PUBLIC_KEY";
                if(ejsOk){try{await emailjs.send(svcId,tplId,{to_email:f.email,to_name:f.name,otp_code:newOtp,app_name:"SocietyConnect"},pubKey);}catch{setSignupDevOtp(newOtp);}}
                else setSignupDevOtp(newOtp);
                setSignupSessionKey(newOtp);
                setErr("New OTP sent!");
                setTimeout(()=>setErr(""),3000);
              }} style={{background:"none",border:"none",color:"#f59e0b",fontSize:12,fontWeight:600,cursor:"pointer"}}>🔄 Resend OTP</button>
            </div>
          </div>}

          {!otpStep&&!signupOtpStep&&<>
          {/* Tab toggle */}
          <div style={{display:"flex",background:"rgba(0,0,0,0.3)",borderRadius:12,padding:4,marginBottom:18,gap:4}}>
            {["login","signup"].map(m=>(
              <button key={m} onClick={()=>switchMode(m)}
                style={{flex:1,padding:"9px",borderRadius:9,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.2s",background:mode===m?"linear-gradient(135deg,#f59e0b,#d97706)":"transparent",color:mode===m?"#111":"#6b7280"}}>
                {m==="login"?"Sign In":"Create Account"}
              </button>
            ))}
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {mode==="signup"&&<input value={f.name} onChange={e=>sv("name",e.target.value)} placeholder="Full Name *" style={IS}/>}
            <input type="email" value={f.email} onChange={e=>sv("email",e.target.value)} placeholder="Email address *" style={IS}/>
            <PwInput value={f.pass} onChange={e=>sv("pass",e.target.value)} placeholder="Password * (min 6 chars)" t={t} onKeyDown={e=>e.key==="Enter"&&mode==="login"&&submit()}/>

            {mode==="login"&&(
              <button onClick={()=>setShowForgot(true)} style={{alignSelf:"flex-end",background:"none",border:"none",color:"#f59e0b",fontSize:12,fontWeight:600,padding:0,marginTop:-4}}>
                Forgot Password?
              </button>
            )}

            {mode==="signup"&&<>
              {/* Phone */}
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#6b7280",pointerEvents:"none",zIndex:1}}>🇮🇳 +91</span>
                <input value={f.phone} onChange={e=>sv("phone",e.target.value.replace(/\D/g,""))} placeholder="10-digit mobile number *" maxLength={10}
                  style={{...IS,paddingLeft:"76px"}}/>
              </div>
              {/* Role */}
              <div style={{display:"flex",gap:8}}>
                {["customer","provider"].map(r=>(
                  <button key={r} onClick={()=>sv("role",r)}
                    style={{flex:1,padding:"10px",borderRadius:10,border:`1px solid ${f.role===r?"#f59e0b":"rgba(255,255,255,0.07)"}`,fontSize:13,fontWeight:600,background:f.role===r?"rgba(245,158,11,0.12)":"transparent",color:f.role===r?"#f59e0b":"#6b7280"}}>
                    {r==="customer"?"🏠 Resident":"🔧 Provider"}
                  </button>
                ))}
              </div>
              {/* Provider fields */}
              {f.role==="provider"&&<>
                <div>
                  <p style={{fontSize:12,color:"#6b7280",marginBottom:6,fontWeight:600}}>YOUR SKILL(S) * <span style={{fontWeight:400,color:"#4b5563"}}>(select one or more)</span></p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                    {["Plumber","Electrician","Cleaner","Shifting"].map(sk=>{
                      const sel=(f.skill||"").split(",").map(x=>x.trim()).filter(Boolean);
                      const checked=sel.includes(sk);
                      return(
                        <label key={sk} onClick={()=>{
                          let cur=sel.includes(sk)?sel.filter(x=>x!==sk):[...sel,sk];
                          sv("skill",cur.join(","));
                        }} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",borderRadius:9,border:`1px solid ${checked?"#f59e0b":"rgba(255,255,255,0.07)"}`,background:checked?"rgba(245,158,11,0.1)":"transparent",cursor:"pointer"}}>
                          <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${checked?"#f59e0b":"rgba(255,255,255,0.2)"}`,background:checked?"#f59e0b":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                            {checked&&<span style={{color:"#111",fontSize:11,fontWeight:700}}>✓</span>}
                          </div>
                          <span style={{fontSize:12,fontWeight:600,color:checked?"#f59e0b":"#9ca3af"}}>{SVC_ICO[sk]} {sk}</span>
                        </label>
                      );
                    })}
                  </div>
                  {!f.skill&&<p style={{fontSize:11,color:"#ef4444",marginTop:5}}>Please select at least one skill.</p>}
                </div>
                <input value={f.exp} onChange={e=>sv("exp",e.target.value)} placeholder="Experience (e.g. 3 yrs)" style={IS}/>
              </>}
              {/* Society */}
              <div>
                <p style={{fontSize:11,color:"#6b7280",marginBottom:5,textTransform:"uppercase",letterSpacing:".5px"}}>Your Society *</p>
                <SocietySelect value={f.society} onChange={v=>sv("society",v)} t={t}/>
              </div>
            </>}

            {err&&<div style={{padding:"9px 12px",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:9,fontSize:13,color:"#f87171"}}>{err}</div>}

            <button onClick={submit} disabled={load}
              style={{padding:"13px",borderRadius:12,border:"none",fontSize:15,fontWeight:700,background:"linear-gradient(135deg,#f59e0b,#b45309)",color:"#111",opacity:load?0.6:1,marginTop:2}}>
              {load?"Please wait…":mode==="login"?"Sign In →":"Create Account →"}

function RuleBook({t}){
  const [q,setQ]=useState("");
  const [cat,setCat]=useState("All");
  const [aiQ,setAiQ]=useState("");
  const [aiA,setAiA]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [showAi,setShowAi]=useState(false);
  const rules=SHAPOORJI_RULES;
  const cats=["All",...new Set(rules.map(r=>r.cat))];
  const filtered=rules.filter(r=>(cat==="All"||r.cat===cat)&&(q===""||r.title.toLowerCase().includes(q.toLowerCase())||r.body.toLowerCase().includes(q.toLowerCase())));
  const askAI=async()=>{
    if(!aiQ.trim())return;setAiLoad(true);setAiA("");
    const ctx=rules.map(r=>`[${r.title}]: ${r.body}`).join("\n\n");
    const ans=await ai(aiQ,`You are a helpful assistant for residents of Shapoorji Complex. Answer based ONLY on these rules:\n\n${ctx}\n\nBe concise and friendly.`);
    setAiA(ans);setAiLoad(false);
  };
  return(
    <div className="fade-in">
      <SH title="📋 Rule Book" sub="Official rules — Shapoorji Complex, New Town" t={t}/>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Search rules…" style={{...iStyle(t),flex:1}}/>
        <button onClick={()=>setShowAi(!showAi)} style={{padding:"10px 13px",borderRadius:10,border:"none",fontSize:13,fontWeight:700,background:showAi?"#f59e0b":"rgba(245,158,11,0.1)",color:showAi?"#111":"#f59e0b",whiteSpace:"nowrap"}}>🤖 Ask AI</button>
      </div>
      {showAi&&<Card t={t} style={{marginBottom:14,border:"1px solid rgba(245,158,11,0.22)"}}>
        <p style={{fontSize:13,fontWeight:700,color:"#f59e0b",margin:"0 0 10px"}}>🤖 Ask AI about Society Rules</p>
        <div style={{display:"flex",gap:8}}>
          <input value={aiQ} onChange={e=>setAiQ(e.target.value)} placeholder="Ask anything about the rules…" onKeyDown={e=>e.key==="Enter"&&askAI()} style={{...iStyle(t),flex:1}}/>
          <Btn onClick={askAI} disabled={aiLoad}>{aiLoad?"…":"Ask"}</Btn>
        </div>
        {aiA&&<div style={{marginTop:12,padding:12,background:"rgba(0,0,0,0.1)",borderRadius:10,fontSize:13,color:t.txt,lineHeight:1.7,borderLeft:"3px solid #f59e0b"}}>{aiA}</div>}
      </Card>}
      <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
        {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:"5px 13px",borderRadius:20,border:`1px solid ${cat===c?"#f59e0b":t.border}`,fontSize:12,fontWeight:600,background:cat===c?"#f59e0b":"transparent",color:cat===c?"#111":t.muted}}>{c}</button>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(r=>(
          <Card key={r.id} t={t}>
            <div style={{display:"flex",gap:12}}>
              <span style={{fontSize:22,flexShrink:0}}>{r.ico}</span>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                  <p style={{fontSize:14,fontWeight:700,color:t.txt,margin:0}}>{r.title}</p>
                  <span style={{fontSize:10,background:"rgba(245,158,11,0.1)",color:"#f59e0b",padding:"2px 8px",borderRadius:10,fontWeight:700}}>{r.cat}</span>
                </div>
                <p style={{fontSize:13,color:t.muted,margin:0,lineHeight:1.7}}>{r.body}</p>
              </div>
            </div>
          </Card>
        ))}
        {filtered.length===0&&<p style={{textAlign:"center",color:t.muted,padding:40}}>No rules found.</p>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   SERVICE REQUEST
══════════════════════════════════════ */
function ServiceReq({user,t,onRequestCreated,setNotifs}){
  const [step,setStep]=useState(1);
  const [f,setF]=useState({svc:"",desc:"",emergency:false});
  const [allProviders,setAllProviders]=useState([]);
  const [provPage,setProvPage]=useState(0);
  const [selectedProvider,setSelectedProvider]=useState(null);
  const [provLoad,setProvLoad]=useState(false);
  const [sub,setSub]=useState(false);
  const [tlLoad,setTlLoad]=useState(false);
  const [tld,setTld]=useState("");
  const [err,setErr]=useState("");
  const [imageData,setImageData]=useState("");
  const [imagePreview,setImagePreview]=useState("");
  const sv=k=>v=>setF(p=>({...p,[k]:v}));
  const est=f.svc?PRICE[f.svc]:null;
  const steps=["Service","Details","Choose Provider","Done"];
  const PAGE_SIZE=3;
  const pagedProviders=allProviders.slice(provPage*PAGE_SIZE,(provPage+1)*PAGE_SIZE);
  const hasMore=(provPage+1)*PAGE_SIZE<allProviders.length;
  const hasPrev=provPage>0;

  const fetchProviders=async(svc)=>{
    setProvLoad(true);setAllProviders([]);setSelectedProvider(null);
    try{const list=await API.getProviders(svc,user.society);setAllProviders(list||[]);}catch{setAllProviders([]);}
    setProvLoad(false);
  };

  const translate=async()=>{if(!f.desc)return;setTlLoad(true);const r=await ai(f.desc,"Translate to English. Return only the translation.");setTld(r);setTlLoad(false);};

  const go=async()=>{
    setErr("");
    if(step===1){if(!f.svc)return;setStep(2);}
    else if(step===2){
      if(!f.desc)return;
      setProvPage(0);
      await fetchProviders(f.svc);
      setStep(3);
    }
    else if(step===3){
      setSub(true);
      try{
        const payload={service_type:f.svc,description:f.desc,emergency:f.emergency?1:0};
        if(selectedProvider)payload.preferred_provider_id=selectedProvider.id;
        if(imageData)payload.image_data=imageData;
        const req=await API.createRequest(payload);
        onRequestCreated(req);
        setNotifs(p=>[{id:Date.now(),type:"info",icon:"👷",title:"Request Submitted",message:`${f.svc} request submitted.`,time:"just now",read_flag:0},...p]);
        setStep(4);
      }catch(e){setErr(e.message);}
      setSub(false);
    }
  };

  return(
    <div className="fade-in">
      <SH title="🛠️ Request Service" sub={`Submitting for: ${user.society||"your society"}`} t={t}/>
      <div style={{display:"flex",alignItems:"center",marginBottom:26}}>
        {steps.map((lbl,i)=>(
          <React.Fragment key={i}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:i+1<=step?"#f59e0b":t.card,color:i+1<=step?"#111":t.muted,border:`1px solid ${i+1<=step?"#f59e0b":t.border}`}}>{i+1<step?"✓":i+1}</div>
              <span style={{fontSize:10,color:i+1===step?"#f59e0b":t.muted,fontWeight:i+1===step?700:400,whiteSpace:"nowrap"}}>{lbl}</span>
            </div>
            {i<3&&<div style={{flex:1,height:2,background:i+1<step?"#f59e0b":t.border,margin:"0 6px",marginBottom:18}}/>}
          </React.Fragment>
        ))}
      </div>
      <ErrBox msg={err} t={t}/>
      <Card t={t}>
        {step===1&&<div>
          <p style={{fontSize:14,fontWeight:600,color:t.txt,marginBottom:14}}>What service do you need?</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {["Plumber","Electrician","Cleaner","Shifting"].map(s=>(
              <button key={s} onClick={()=>sv("svc")(s)} style={{padding:"14px 10px",borderRadius:12,border:`2px solid ${f.svc===s?SVC_COL[s]:t.border}`,background:f.svc===s?SVC_COL[s]+"12":"transparent",transition:"all 0.15s",textAlign:"center"}}>
                <div style={{fontSize:26,marginBottom:6}}>{SVC_ICO[s]}</div>
                <p style={{fontSize:13,fontWeight:700,color:t.txt,margin:"0 0 3px"}}>{s}</p>
                <p style={{fontSize:11,color:SVC_COL[s],margin:0}}>₹{PRICE[s][0]}–{PRICE[s][1]}/{UNIT[s]}</p>
              </button>
            ))}
          </div>
          <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <input type="checkbox" checked={f.emergency} onChange={e=>sv("emergency")(e.target.checked)} style={{width:16,height:16,accentColor:"#ef4444"}}/>
            <span style={{fontSize:13,color:"#f87171",fontWeight:600}}>⚡ Emergency Request (Priority)</span>
          </label>
          <div style={{display:"flex",justifyContent:"flex-end"}}><Btn onClick={go} disabled={!f.svc}>Next →</Btn></div>
        </div>}
        {step===2&&<div>
          <p style={{fontSize:14,fontWeight:600,color:t.txt,marginBottom:12}}>Describe your problem</p>
          <textarea value={f.desc} onChange={e=>sv("desc")(e.target.value)} placeholder={`Describe your ${f.svc.toLowerCase()} issue…`}
            style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${t.border}`,background:t.inp,color:t.txt,fontSize:14,resize:"vertical",minHeight:90,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
          <div style={{display:"flex",gap:8,margin:"10px 0"}}>
            <Btn v="ghost" sz="sm" onClick={translate} disabled={tlLoad||!f.desc}>{tlLoad?"Translating…":"🌐 Translate to English"}</Btn>
          </div>
          {tld&&<div style={{padding:"10px 12px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:8,marginBottom:12}}>
            <p style={{fontSize:11,color:"#818cf8",margin:"0 0 3px",fontWeight:600}}>🌐 English:</p>
            <p style={{fontSize:13,color:t.txt,margin:0}}>{tld}</p>
          </div>}

          {/* Photo upload */}
          <div style={{marginBottom:14}}>
            <p style={{fontSize:13,fontWeight:600,color:t.muted,marginBottom:8}}>📷 Add a Photo <span style={{fontWeight:400,color:"#4b5563"}}>(optional — helps provider understand the issue)</span></p>
            {!imagePreview&&<label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:"20px",border:`2px dashed ${t.border}`,borderRadius:12,cursor:"pointer",background:"rgba(0,0,0,0.15)",transition:"border-color 0.2s"}}
              onDragOver={e=>{e.preventDefault();}}
              onDrop={e=>{e.preventDefault();const file=e.dataTransfer.files[0];if(file&&file.type.startsWith("image/")){const r=new FileReader();r.onload=ev=>{setImagePreview(ev.target.result);setImageData(ev.target.result);};r.readAsDataURL(file);}}}>
              <span style={{fontSize:28}}>📸</span>
              <span style={{fontSize:13,color:t.muted}}>Tap to upload or drag &amp; drop</span>
              <span style={{fontSize:11,color:"#4b5563"}}>JPG, PNG — max 2MB</span>
              <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                const file=e.target.files[0];
                if(!file)return;
                if(file.size>2*1024*1024){alert("Image too large. Max 2MB.");return;}
                const r=new FileReader();
                r.onload=ev=>{setImagePreview(ev.target.result);setImageData(ev.target.result);};
                r.readAsDataURL(file);
              }}/>
            </label>}
            {imagePreview&&<div style={{position:"relative",display:"inline-block",width:"100%"}}>
              <img src={imagePreview} alt="preview" style={{width:"100%",maxHeight:180,objectFit:"cover",borderRadius:12,border:`1px solid ${t.border}`}}/>
              <button onClick={()=>{setImagePreview("");setImageData("");}} style={{position:"absolute",top:8,right:8,background:"rgba(239,68,68,0.85)",border:"none",borderRadius:"50%",width:28,height:28,color:"#fff",fontSize:14,cursor:"pointer",fontWeight:700}}>×</button>
            </div>}
          </div>

          <div style={{display:"flex",gap:10,justifyContent:"space-between"}}><Btn v="ghost" onClick={()=>setStep(1)}>← Back</Btn><Btn onClick={go} disabled={!f.desc}>Find Providers →</Btn></div>
        </div>}
        {step===3&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{fontSize:14,fontWeight:700,color:t.txt,margin:0}}>{provLoad?"🔍 Finding providers…":`${f.svc} Providers in your society`}</p>
            <button onClick={async()=>{setProvPage(0);await fetchProviders(f.svc);}} disabled={provLoad}
              style={{display:"flex",alignItems:"center",gap:6,padding:"6px 13px",borderRadius:20,border:`1px solid ${t.border}`,background:t.hov,color:t.muted,fontSize:12,fontWeight:600}}>
              {provLoad?"…":"↻ Refresh"}
            </button>
          </div>

          {provLoad&&<div style={{textAlign:"center",padding:"28px 0",color:t.muted}}><p style={{fontSize:24,marginBottom:8}}>🔍</p><p style={{fontSize:13}}>Looking for available providers…</p></div>}

          {!provLoad&&allProviders.length===0&&<div style={{padding:"16px",background:"rgba(239,68,68,0.05)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:12,marginBottom:14}}>
            <p style={{fontSize:14,fontWeight:700,color:"#f87171",margin:"0 0 5px"}}>⚠️ No Providers Available Right Now</p>
            <p style={{color:t.muted,fontSize:13,margin:0}}>No {f.svc} providers in {user.society} are currently available. Your request will be visible to all matching providers when they come online.</p>
          </div>}

          {!provLoad&&pagedProviders.length>0&&<>

                        </div>
                        <p style={{fontSize:12,color:t.muted,margin:"0 0 4px"}}>{p.experience||"—"} exp · {p.jobs_done||0} jobs done</p>

          <div style={{padding:"11px 13px",background:t.hov,borderRadius:10,marginBottom:14}}>
