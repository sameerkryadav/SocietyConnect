                              r.status === "Accepted" ? "Provider accepted your request! Waiting for them to head over 👍" :
                                r.status === "On the way" ? "Your provider is on the way 🚗" :
                                  r.status === "Coming" ? "Provider is almost there 🚶" :
                                    r.status === "Reached" || r.status === "Arrived" ? "Provider has reached your location! 🏠" : "—"
                            }</p>
                          </div>
                        </div>
                      )}

                      {/* Start Work button for customer (when provider has accepted/arrived) */}
                      {canStartWork && (
                        <div style={{ marginBottom: 8 }}>
                          <Btn sz="sm" v="ok" onClick={() => startWork(r)} disabled={al === "start"}>
                            {al === "start" ? "Starting…" : "⚙️ Confirm Work Started"}
                          </Btn>
                          <p style={{ fontSize: 11, color: t.muted, margin: "5px 0 0" }}>Tap when the provider begins working</p>
                        </div>
                      )}

                      {/* OTP section for active/in-progress jobs */}
                      {r.status === "In Progress" && user.role === "customer" && (
                        <div style={{ background: "rgba(245,158,11,0.06)", border: "1px solid rgba(245,158,11,0.18)", borderRadius: 10, padding: "11px 13px", marginTop: 4, marginBottom: 8 }}>
                          <p style={{ fontSize: 12, fontWeight: 700, color: "#8B83A8", margin: "0 0 6px" }}>🔐 Job Completion OTP</p>
                          {otp
                            ? <>
                              <p style={{ fontSize: 11, color: t.muted, margin: "0 0 8px" }}>Share this OTP with your provider to confirm job completion:</p>
                              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                <div style={{ fontSize: 28, fontWeight: 900, letterSpacing: 8, color: "#8B83A8", fontFamily: "monospace", background: t.inp, padding: "10px 18px", borderRadius: 10, border: "2px dashed rgba(139,131,168,0.4)" }}>{otp}</div>
                                <div>
                                  <p style={{ fontSize: 11, color: "#10b981", margin: "0 0 4px", fontWeight: 600 }}>✅ Valid OTP</p>
                                  <button onClick={() => generateOtp(r.id)} style={{ background: "none", border: "none", color: t.muted, fontSize: 11, padding: 0, cursor: "pointer", textDecoration: "underline" }}>Regenerate</button>
                                </div>
                              </div>
                            </>
                            : <>
                              <p style={{ fontSize: 11, color: t.muted, margin: "0 0 8px" }}>Generate a one-time code to verify when your provider completes the job.</p>
                              <Btn sz="sm" onClick={() => generateOtp(r.id)} disabled={otpLoading[r.id]}>
                                {otpLoading[r.id] ? "Generating…" : "🔑 Generate OTP"}
                              </Btn>
                            </>
                          }
                        </div>
                      )}

                      {/* Cancel button for customer */}
                      {canCancel && (
                        <div style={{ marginTop: 4 }}>
                          <Btn sz="sm" v="bad" onClick={() => cancelRequest(r)} disabled={al === "cancel"}>
                            {al === "cancel" ? "Cancelling…" : "✕ Cancel Request"}
                          </Btn>
                        </div>
                      )}

                      {r.status === "Completed" && <>
                        <p style={{ fontSize: 13, color: "#10b981", fontWeight: 700, margin: "6px 0 4px" }}>✅ Job Completed</p>
                        {user.role === "customer" && r.provider_id && (
                          ratedIds[r.id]
                            ? <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 11px", background: "rgba(139,131,168,0.07)", border: "1px solid rgba(245,158,11,0.18)", borderRadius: 9, marginTop: 4 }}>
                              <span style={{ fontSize: 15 }}>{[...Array(ratedIds[r.id])].map((_, i) => <span key={i} style={{ color: "#8B83A8" }}>★</span>)}{[...Array(5 - ratedIds[r.id])].map((_, i) => <span key={i} style={{ color: "rgba(255,255,255,0.12)" }}>★</span>)}</span>
                              <span style={{ fontSize: 12, color: "#8B83A8", fontWeight: 600 }}>You rated this {ratedIds[r.id]}/5</span>
                            </div>
                            : <button onClick={() => setRatingReq(r)}
                              style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 14px", borderRadius: 20, border: "1px solid rgba(139,131,168,0.35)", background: "rgba(139,131,168,0.08)", color: "#8B83A8", fontSize: 12, fontWeight: 700, marginTop: 6, cursor: "pointer" }}>
                              ⭐ Rate this service
                            </button>
                        )}
                      </>}
                      {r.status === "Cancelled" && <p style={{ fontSize: 13, color: "#f87171", fontWeight: 700, margin: "6px 0 0" }}>❌ Request Cancelled</p>}
                    </div>
                  </div>
                </Card>
              );
            })
          }
        </div>
      );
    }

    /* ══════════════════════════════════════
       NOTIFICATIONS
    ══════════════════════════════════════ */
    function Notifs({ t, notifs, setNotifs, onRefresh }) {
      const markAll = async () => { try { await API.markAllRead(); } catch { } setNotifs(p => p.map(n => ({ ...n, read_flag: 1 }))); };
      const markOne = async (id) => { try { await API.markRead(id); } catch { } setNotifs(p => p.map(n => n.id === id ? { ...n, read_flag: 1 } : n)); };
      const unread = notifs.filter(n => !n.read_flag).length;
      return (
        <div className="fade-in">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <div><h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, color: t.txt, margin: 0 }}>🔔 Notifications</h2><p style={{ color: t.muted, fontSize: 13, marginTop: 4 }}>{unread} unread</p></div>
            <div style={{ display: "flex", gap: 8 }}><Btn v="ghost" sz="sm" onClick={onRefresh}>↻</Btn><Btn v="ghost" sz="sm" onClick={markAll}>Mark all read</Btn></div>
          </div>
          {notifs.length === 0 ? <p style={{ color: t.muted, fontSize: 14, textAlign: "center", padding: "40px 0" }}>No notifications yet.</p>
            : notifs.map(n => (
              <div key={n.id} onClick={() => markOne(n.id)} style={{ display: "flex", gap: 13, padding: "13px 15px", background: n.read_flag ? t.card : "rgba(245,158,11,0.04)", border: `1px solid ${n.read_flag ? t.border : "rgba(245,158,11,0.18)"}`, borderRadius: 13, marginBottom: 8 }}>
                <span style={{ fontSize: 20, flexShrink: 0 }}>{n.icon || "🔔"}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><p style={{ fontSize: 14, fontWeight: 600, color: t.txt, margin: 0 }}>{n.title}</p><span style={{ fontSize: 11, color: t.muted, flexShrink: 0 }}>{n.created_at}</span></div>
                  <p style={{ fontSize: 12, color: t.muted, margin: "3px 0 0", lineHeight: 1.45 }}>{n.message}</p>
                </div>
                {!n.read_flag && <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#8B83A8", flexShrink: 0, marginTop: 4 }} />}
              </div>
            ))
          }
        </div>
      );
    }

    /* ══════════════════════════════════════
       SWITCH ROLE MODAL
    ══════════════════════════════════════ */
    function SwitchRoleModal({ user, onClose, onSwitched, t }) {
      const targetRole = user.role === "customer" ? "provider" : "customer";
      const [skill, setSkill] = useState(user.skill || "");
      const [exp, setExp] = useState(user.experience || "");
      const [err, setErr] = useState("");
      const [load, setLoad] = useState(false);
      const doSwitch = async () => {
        if (targetRole === "provider" && !skill) { setErr("Please select your skill."); return; }
        setLoad(true); setErr("");
        try {
          const r = await API.switchRole({ role: targetRole, skill: targetRole === "provider" ? skill : "", experience: exp });
          localStorage.setItem("sc_token", r.token);
          onSwitched(r.user);
          onClose();
        } catch (e) { setErr(e.message); }
        setLoad(false);
      };
      return (
        <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-box">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 20, color: "#e6edf3", margin: 0 }}>🔄 Switch to {targetRole === "provider" ? "Provider" : "Resident"}</h3>
              <button onClick={onClose} style={{ background: "none", border: "none", color: "#7d8590", fontSize: 22 }}>×</button>
            </div>
            <div style={{ padding: "11px 13px", background: targetRole === "provider" ? "rgba(139,131,168,0.07)" : "rgba(139,92,246,0.07)", border: `1px solid ${targetRole === "provider" ? "rgba(139,131,168,0.2)" : "rgba(139,92,246,0.2)"}`, borderRadius: 11, marginBottom: 16, fontSize: 13, color: targetRole === "provider" ? "#8B83A8" : "#60a5fa", lineHeight: 1.6 }}>
              {targetRole === "provider" ? "🔧 You will switch to Provider mode. You can accept service jobs from your society." : "🏠 You will switch to Resident mode. You can request services from providers."}
            </div>
            {targetRole === "provider" && <>
              <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 6, fontWeight: 600 }}>YOUR SKILL(S) * <span style={{ fontWeight: 400, color: "#4b5563" }}>(select one or more)</span></p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 10 }}>
                {["Plumber", "Electrician", "Cleaner", "Shifting"].map(sk => {
                  const sel = (skill || "").split(",").map(x => x.trim()).filter(Boolean);
                  const checked = sel.includes(sk);
                  return (
                    <label key={sk} onClick={() => {
                      let cur = sel.includes(sk) ? sel.filter(x => x !== sk) : [...sel, sk];
                      setSkill(cur.join(","));
                    }} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 11px", borderRadius: 9, border: `1px solid ${checked ? "#8B83A8" : "rgba(255,255,255,0.07)"}`, background: checked ? "rgba(139,131,168,0.1)" : "transparent", cursor: "pointer" }}>
                      <div style={{ width: 16, height: 16, borderRadius: 4, border: `2px solid ${checked ? "#8B83A8" : "rgba(255,255,255,0.2)"}`, background: checked ? "#8B83A8" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        {checked && <span style={{ color: "#111", fontSize: 11, fontWeight: 700 }}>✓</span>}
                      </div>
                      <span style={{ fontSize: 12, fontWeight: 600, color: checked ? "#8B83A8" : "#9ca3af" }}>{SVC_ICO[sk]} {sk}</span>
                    </label>
                  );
                })}
              </div>
              <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 6, fontWeight: 600 }}>EXPERIENCE</p>
              <input value={exp} onChange={e => setExp(e.target.value)} placeholder="e.g. 3 yrs, 5 years…"
                style={{ width: "100%", padding: "10px 13px", borderRadius: 9, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(0,0,0,0.3)", color: "#e6edf3", fontSize: 14, boxSizing: "border-box", marginBottom: 14 }} />
            </>}
            {err && <div style={{ padding: "9px 12px", background: "rgba(239,68,68,0.07)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 9, fontSize: 13, color: "#f87171", marginBottom: 12 }}>{err}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              <Btn v="ghost" onClick={onClose} style={{ flex: 1 }}>Cancel</Btn>
              <button onClick={doSwitch} disabled={load} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700, background: targetRole === "provider" ? "linear-gradient(135deg,#5B4B8A,#8B83A8)" : "linear-gradient(135deg,#3b82f6,#1d4ed8)", color: "#fff" }}>
                {load ? "Switching…" : `Switch to ${targetRole === "provider" ? "Provider" : "Resident"}`}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       DELETE ACCOUNT MODAL
    ══════════════════════════════════════ */
    function DeleteAccountModal({ onClose, onDeleted, t }) {
      const [confirm, setConfirm] = useState("");
      const [err, setErr] = useState("");
      const [load, setLoad] = useState(false);
      const doDelete = async () => {
        if (confirm !== "DELETE") { setErr('Type DELETE to confirm.'); return; }
        setLoad(true);
        try {
          await API.deleteMe();
          localStorage.removeItem("sc_token");
          onDeleted();
        } catch (e) { setErr(e.message); }
        setLoad(false);
      };
      return (
        <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-box">
            <div style={{ textAlign: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 44, marginBottom: 10 }}>🗑️</div>
              <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: 20, color: "#f87171", margin: "0 0 6px" }}>Delete Account</h3>
              <p style={{ fontSize: 13, color: "#7d8590", lineHeight: 1.6 }}>This will permanently delete your account and all data. <strong style={{ color: "#f87171" }}>This cannot be undone.</strong></p>
            </div>
            <div style={{ padding: "11px 13px", background: "rgba(239,68,68,0.07)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 10, marginBottom: 16, fontSize: 13, color: "#f87171" }}>
              ⚠️ Deletes: your profile, all service requests, messages, notifications, and reviews.
            </div>
            <p style={{ fontSize: 12, color: "#6b7280", marginBottom: 6, fontWeight: 600 }}>TYPE "DELETE" TO CONFIRM</p>
            <input value={confirm} onChange={e => setConfirm(e.target.value.toUpperCase())} placeholder="DELETE"
              style={{ width: "100%", padding: "10px 13px", borderRadius: 9, border: "1px solid rgba(239,68,68,0.3)", background: "rgba(0,0,0,0.3)", color: "#f87171", fontSize: 14, boxSizing: "border-box", marginBottom: 12, letterSpacing: 2, fontFamily: "monospace", fontWeight: 700 }} />
            {err && <div style={{ padding: "9px 12px", background: "rgba(239,68,68,0.07)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 9, fontSize: 13, color: "#f87171", marginBottom: 12 }}>{err}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              <Btn v="ghost" onClick={onClose} style={{ flex: 1 }}>Cancel</Btn>
              <button onClick={doDelete} disabled={load || confirm !== "DELETE"}
                style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", fontSize: 14, fontWeight: 700, background: confirm === "DELETE" ? "linear-gradient(135deg,#ef4444,#dc2626)" : "rgba(100,100,100,0.3)", color: confirm === "DELETE" ? "#fff" : "#666" }}>
                {load ? "Deleting…" : "Delete My Account"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       PROFILE
    ══════════════════════════════════════ */
    function Profile({ user, setUser, t, onLogout }) {
      const [editMode, setEditMode] = useState(false);
      const [showSwitch, setShowSwitch] = useState(false);
      const [showDelete, setShowDelete] = useState(false);
      const [form, setForm] = useState({ name: user.name || "", address: user.address || "", society: user.society || "", flat: user.flat || "", experience: user.experience || "" });
      const [saved, setSaved] = useState(false);
      const [saving, setSaving] = useState(false);
      const [err, setErr] = useState("");

      const handleSave = async () => {
        if (!form.name.trim()) { setErr("Name required."); return; }
        setSaving(true); setErr("");
        try {
          // Send all fields including experience — server merges provider table
          const updated = await API.updateMe({
            name: form.name, address: form.address, society: form.society, flat: form.flat,
            experience: form.experience
          });
          setUser(u => ({ ...u, ...updated }));
          setForm(f => ({ ...f, ...updated }));
          setEditMode(false); setSaved(true);
          setTimeout(() => setSaved(false), 2500);
        } catch (e) { setErr(e.message); }
        setSaving(false);
      };

      return (
        <div className="fade-in">
          {showSwitch && <SwitchRoleModal user={user} onClose={() => setShowSwitch(false)} onSwitched={u => setUser(u)} t={t} />}
          {showDelete && <DeleteAccountModal onClose={() => setShowDelete(false)} onDeleted={onLogout} t={t} />}
          <SH title="👤 Profile" sub="Your account and community information" t={t} />
          {saved && <OkBox msg="✅ Profile updated!" t={t} />}
          <Card t={t} style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
              <div style={{ display: "flex", gap: 13, alignItems: "center" }}>
                <Av s={user.name || "U"} sz={50} />
                <div>
                  <p style={{ fontSize: 18, fontWeight: 700, color: t.txt, margin: 0 }}>{user.name}</p>
                  <p style={{ fontSize: 13, color: t.muted, margin: "3px 0 0", textTransform: "capitalize" }}>{user.role}{user.flat ? ` · Flat ${user.flat}` : ""}</p>
                </div>
              </div>
              <Btn sz="sm" v={editMode ? "bad" : "ghost"} onClick={() => { if (editMode) { setForm({ name: user.name || "", address: user.address || "", society: user.society || "", flat: user.flat || "", experience: user.experience || "" }); setErr(""); setEditMode(false); } else setEditMode(true); }}>
                {editMode ? "✕ Cancel" : "✏️ Edit"}
              </Btn>
            </div>
            <div style={{ height: 1, background: t.border, margin: "14px 0" }} />
            <ErrBox msg={err} t={t} />
            {editMode ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div><p style={{ fontSize: 12, color: t.muted, marginBottom: 5, fontWeight: 600 }}>Full Name *</p>
                  <input value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} style={iStyle(t)} /></div>
                <div><p style={{ fontSize: 12, color: t.muted, marginBottom: 5, fontWeight: 600 }}>Flat Number</p>
                  <input value={form.flat} onChange={e => setForm(f => ({ ...f, flat: e.target.value }))} placeholder="e.g. A-401" style={iStyle(t)} /></div>
                <div><p style={{ fontSize: 12, color: t.muted, marginBottom: 5, fontWeight: 600 }}>Home Address</p>
                  <input value={form.address} onChange={e => setForm(f => ({ ...f, address: e.target.value }))} placeholder="e.g. Block A, Tower 3" style={iStyle(t)} /></div>
                {user.role === "provider" && <div><p style={{ fontSize: 12, color: t.muted, marginBottom: 5, fontWeight: 600 }}>Work Experience</p>
                  <input value={form.experience} onChange={e => setForm(f => ({ ...f, experience: e.target.value }))} placeholder="e.g. 5 yrs, 3 years" style={iStyle(t)} /></div>}
                <div style={{ background: "rgba(245,158,11,0.05)", border: "1px solid rgba(245,158,11,0.18)", borderRadius: 11, padding: "12px 13px" }}>
                  <p style={{ fontSize: 12, color: "#8B83A8", marginBottom: 8, fontWeight: 700 }}>📍 Society / Location</p>
                  <SocietySelect value={form.society} onChange={v => setForm(f => ({ ...f, society: v }))} t={t} />
                  <p style={{ fontSize: 11, color: t.muted, marginTop: 7 }}>{user.role === "customer" ? "🏘️ Your requests will go to providers in this society." : "🔧 You will see open jobs from this society."}</p>
                </div>
                <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                  <Btn v="ok" onClick={handleSave} disabled={saving}>{saving ? "Saving…" : "💾 Save Changes"}</Btn>
                </div>
                <p style={{ fontSize: 11, color: t.muted, textAlign: "center" }}>📧 Email and phone cannot be changed here.</p>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                {[["Email", user.email || "—"], ["Phone", user.phone || "Not set"], ["Address", user.address || "Not set"], ["Flat", user.flat || "Not set"], ["Society", user.society || "Not set"], ["Member Since", user.joined_at || "—"]].map(([k, v]) => (
                  <div key={k}><p style={{ fontSize: 11, color: t.muted, margin: "0 0 2px", textTransform: "uppercase", letterSpacing: ".5px" }}>{k}</p><p style={{ fontSize: 13, fontWeight: 600, color: t.txt, margin: 0, wordBreak: "break-word" }}>{v}</p></div>
                ))}
              </div>
            )}
          </Card>

          {/* Provider stats */}
          {user.role === "provider" && <Card t={t} style={{ marginBottom: 14 }}>
            <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, marginBottom: 12 }}>Provider Stats</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 12 }}>
              {[["⭐", user.rating || "—", "Rating"], ["📦", user.jobs_done || 0, "Jobs Done"], ["✅", user.available ? "Open" : "Closed", "Status"]].map(([i, v, l]) => (
                <div key={l} style={{ textAlign: "center", padding: "12px 8px", background: t.hov, borderRadius: 10 }}>
                  <p style={{ fontSize: 20, margin: "0 0 4px" }}>{i}</p>
                  <p style={{ fontSize: 15, fontWeight: 700, color: t.txt, margin: 0 }}>{v}</p>
                  <p style={{ fontSize: 11, color: t.muted, margin: "2px 0 0" }}>{l}</p>
                </div>
              ))}
            </div>
            {/* Skills badges */}
            <p style={{ fontSize: 11, color: t.muted, marginBottom: 6, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px" }}>Skills</p>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
              {(user.skill || "").split(",").map(sk => sk.trim()).filter(Boolean).map(sk => (
                <span key={sk} style={{ fontSize: 12, background: (SVC_COL[sk] || "#666") + "22", color: SVC_COL[sk] || "#888", padding: "4px 12px", borderRadius: 20, fontWeight: 700 }}>{SVC_ICO[sk] || "🔧"} {sk}</span>
              ))}
              {!user.skill && <span style={{ color: t.muted, fontSize: 13 }}>—</span>}
            </div>
            {user.experience && <p style={{ fontSize: 13, color: t.muted, marginTop: 4 }}>Experience: <strong style={{ color: t.txt }}>{user.experience}</strong></p>}
          </Card>}

          {/* Switch role */}
          <Card t={t} style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, margin: 0 }}>Switch Account Mode</p>
                <p style={{ fontSize: 12, color: t.muted, margin: "3px 0 0" }}>Currently: <span style={{ color: "#8B83A8", fontWeight: 700, textTransform: "capitalize" }}>{user.role}</span></p>
              </div>
              <Btn sz="sm" v="info" onClick={() => setShowSwitch(true)}>🔄 Switch to {user.role === "customer" ? "Provider" : "Resident"}</Btn>
            </div>
          </Card>

          {/* Danger zone */}
          <Card t={t} style={{ border: "1px solid rgba(239,68,68,0.2)" }}>
            <p style={{ fontSize: 14, fontWeight: 700, color: "#f87171", marginBottom: 8 }}>⚠️ Danger Zone</p>
            <p style={{ fontSize: 13, color: t.muted, marginBottom: 14 }}>Once you delete your account, all your data is permanently removed. This cannot be undone.</p>
            <Btn v="bad" onClick={() => setShowDelete(true)}>🗑️ Delete My Account</Btn>
          </Card>
        </div>
      );
    }

    /* ══════════════════════════════════════
       CONTACT US / SUPPORT
    ══════════════════════════════════════ */
    function Support({ user, t }) {
      const [form, setForm] = useState({ subject: "", message: "" });
      const [tickets, setTickets] = useState([]);
      const [load, setLoad] = useState(false);
      const [fetchLoad, setFetchLoad] = useState(true);
      const [err, setErr] = useState("");
      const [ok, setOk] = useState("");

      useEffect(() => {
        (async () => {
          try { setTickets(await API.getTickets()); } catch { }
          setFetchLoad(false);
        })();
      }, []);

      const submit = async () => {
        if (!form.subject.trim() || !form.message.trim()) { setErr("Subject and message are required."); return; }
        setLoad(true); setErr("");
        try {
          const t = await API.createTicket(form);
          setTickets(p => [t, ...p]);
          setForm({ subject: "", message: "" });
          setOk("✅ Support ticket submitted! We'll respond soon.");
          setTimeout(() => setOk(""), 3000);
        } catch (e) { setErr(e.message); }
        setLoad(false);
      };

      const STATUS_COL = { "open": { bg: "rgba(139,131,168,0.12)", c: "#C5C0D8" }, "resolved": { bg: "rgba(16,185,129,0.12)", c: "#10b981" } };

      return (
        <div className="fade-in">
          <SH title="🎧 Contact Us" sub="Submit a support request or view your tickets" t={t} />
          <Card t={t} style={{ marginBottom: 16 }}>
            <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, marginBottom: 14 }}>Submit a Support Request</p>
            <ErrBox msg={err} t={t} />
            <OkBox msg={ok} t={t} />
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div><p style={{ fontSize: 12, color: t.muted, marginBottom: 5, fontWeight: 600 }}>SUBJECT</p>
                <input value={form.subject} onChange={e => setForm(f => ({ ...f, subject: e.target.value }))} placeholder="e.g. Issue with service request" style={iStyle(t)} /></div>
              <div><p style={{ fontSize: 12, color: t.muted, marginBottom: 5, fontWeight: 600 }}>MESSAGE</p>
                <textarea value={form.message} onChange={e => setForm(f => ({ ...f, message: e.target.value }))} placeholder="Describe your issue in detail…"
                  style={{ ...iStyle(t), resize: "vertical", minHeight: 100 }} /></div>
              <Btn onClick={submit} disabled={load} full>{load ? "Submitting…" : "Submit Ticket →"}</Btn>
            </div>
          </Card>

          <SH title="My Tickets" t={t} />
          {fetchLoad ? <Spinner /> : tickets.length === 0 ? <p style={{ color: t.muted, fontSize: 14, textAlign: "center", padding: "30px 0" }}>No tickets yet.</p>
            : tickets.map(tk => (
              <Card key={tk.id} t={t} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, margin: 0, flex: 1 }}>{tk.subject}</p>
                  <span style={{ background: STATUS_COL[tk.status]?.bg || "rgba(100,100,100,0.12)", color: STATUS_COL[tk.status]?.c || "#9ca3af", fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20, whiteSpace: "nowrap", marginLeft: 8 }}>{tk.status}</span>
                </div>
                <p style={{ fontSize: 13, color: t.muted, margin: "0 0 6px", lineHeight: 1.5 }}>{tk.message}</p>
                {tk.reply && <div style={{ padding: "10px 12px", background: "rgba(16,185,129,0.07)", border: "1px solid rgba(16,185,129,0.2)", borderRadius: 9, marginTop: 8 }}>
                  <p style={{ fontSize: 11, color: "#10b981", margin: "0 0 4px", fontWeight: 700 }}>💬 Support Reply:</p>
                  <p style={{ fontSize: 13, color: t.txt, margin: 0, lineHeight: 1.5 }}>{tk.reply}</p>
                </div>}
                <p style={{ fontSize: 11, color: t.muted, margin: "8px 0 0" }}>{tk.created_at}</p>
              </Card>
            ))
          }
        </div>
      );
    }

    /* ══════════════════════════════════════
       ADMIN PANEL
    ══════════════════════════════════════ */
    function AdminPanel({ t }) {
      const [stats, setStats] = useState(null);
      const [users, setUsers] = useState([]);
      const [tickets, setTickets] = useState([]);
      const [tab, setTab] = useState("stats");
      const [loading, setLoading] = useState(true);
      const [reply, setReply] = useState({});
      const [replyLoad, setReplyLoad] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const [s, u, tk] = await Promise.all([API.getAdminStats(), API.getAllUsers(), API.getTickets()]);
            setStats(s); setUsers(u); setTickets(tk);
          } catch { }
          setLoading(false);
        })();
      }, []);

      const sendReply = async (ticketId) => {
        const r = reply[ticketId] || "";
        if (!r.trim()) return;
        setReplyLoad(ticketId);
        try {
          const updated = await API.call(`/api/support/${ticketId}/reply`, { method: "PUT", body: JSON.stringify({ reply: r }) });
          setTickets(p => p.map(t => t.id === ticketId ? updated : t));
          setReply(p => ({ ...p, [ticketId]: "" }));
        } catch { }
        setReplyLoad(null);
      };

      if (loading) return <Spinner />;
      return (
        <div className="fade-in">
          <SH title="⚙️ Admin Panel" sub="Society management overview" t={t} />
          <div style={{ display: "flex", background: "rgba(0,0,0,0.2)", borderRadius: 11, padding: 4, marginBottom: 18, gap: 4 }}>
            {[["stats", "📊 Stats"], ["users", "👥 Users"], ["tickets", "🎧 Support"]].map(([k, l]) => (
              <button key={k} onClick={() => setTab(k)} style={{ flex: 1, padding: "8px", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 700, background: tab === k ? "linear-gradient(135deg,#334155,#4f6a82)" : "transparent", color: tab === k ? "#ffffff" : "#6b7280", cursor: "pointer" }}>{l}</button>
            ))}
          </div>
          {tab === "stats" && stats && <>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))", gap: 12, marginBottom: 18 }}>
              {[{ l: "Total Users", v: stats.total_users || 0, i: "👥" }, { l: "Residents", v: stats.total_customers || 0, i: "🏠" }, { l: "Providers", v: stats.total_providers || 0, i: "🔧" }, { l: "Requests", v: stats.total_requests || 0, i: "📋" }, { l: "Completed", v: stats.completed_requests || 0, i: "✅" }, { l: "Open Tickets", v: stats.open_support_tickets || 0, i: "🎧" }].map(s => (
                <div key={s.l} style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 12px" }}>
                  <div style={{ fontSize: 22, marginBottom: 8 }}>{s.i}</div>
                  <p style={{ fontSize: 26, fontWeight: 700, color: t.txt, margin: "0 0 2px" }}>{s.v}</p>
                  <p style={{ fontSize: 11, color: t.muted, margin: 0 }}>{s.l}</p>
                </div>
              ))}
            </div>
          </>}
          {tab === "users" && <Card t={t}>
            <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, marginBottom: 12 }}>All Users ({users.length})</p>
            {users.length === 0 ? <p style={{ color: t.muted, textAlign: "center", padding: "20px 0" }}>No users yet.</p>
              : users.map(u => (
                <div key={u.id} style={{ display: "flex", alignItems: "center", gap: 11, padding: "9px 11px", background: t.hov, borderRadius: 10, marginBottom: 7 }}>
                  <Av s={u.name || "U"} sz={32} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <p style={{ fontSize: 13, fontWeight: 600, color: t.txt, margin: 0 }}>{u.name}</p>
                    <p style={{ fontSize: 11, color: t.muted, margin: "1px 0 0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{u.email} · {u.phone || "—"}</p>
                    <p style={{ fontSize: 10, color: t.muted, margin: "1px 0 0" }}>{u.society}</p>
                  </div>
                  <span style={{ fontSize: 11, background: "rgba(139,131,168,0.1)", color: "#8B83A8", padding: "2px 8px", borderRadius: 8, fontWeight: 700, textTransform: "capitalize" }}>{u.role}</span>
                </div>
              ))
            }
          </Card>}
          {tab === "tickets" && <div>
            {tickets.length === 0 ? <p style={{ color: t.muted, textAlign: "center", padding: "30px 0" }}>No support tickets.</p>
              : tickets.map(tk => (
                <Card key={tk.id} t={t} style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, margin: 0 }}>{tk.subject}</p>
                    <span style={{ fontSize: 11, color: tk.status === "resolved" ? "#10b981" : "#C5C0D8", fontWeight: 700, textTransform: "uppercase" }}>{tk.status}</span>
                  </div>
                  <p style={{ fontSize: 12, color: "#8B83A8", margin: "0 0 4px", fontWeight: 600 }}>From: {tk.user_name || "—"} ({tk.user_email || "—"})</p>
                  <p style={{ fontSize: 13, color: t.muted, margin: "0 0 10px", lineHeight: 1.5 }}>{tk.message}</p>
                  {tk.reply && <div style={{ padding: "9px 11px", background: "rgba(16,185,129,0.07)", border: "1px solid rgba(16,185,129,0.2)", borderRadius: 8, marginBottom: 10 }}>
                    <p style={{ fontSize: 12, color: "#10b981", margin: "0 0 3px", fontWeight: 600 }}>Your Reply:</p>
                    <p style={{ fontSize: 13, color: t.txt, margin: 0 }}>{tk.reply}</p>
                  </div>}
                  {!tk.reply && <div style={{ display: "flex", gap: 8 }}>
                    <input value={reply[tk.id] || ""} onChange={e => setReply(p => ({ ...p, [tk.id]: e.target.value }))} placeholder="Type reply…" style={{ ...iStyle(t), flex: 1 }} />
                    <Btn sz="sm" v="ok" onClick={() => sendReply(tk.id)} disabled={replyLoad === tk.id}>{replyLoad === tk.id ? "…" : "Send"}</Btn>
                  </div>}
                </Card>
              ))
            }
          </div>}
        </div>
      );
    }

    /* ══════════════════════════════════════
       PROVIDER PANEL
    ══════════════════════════════════════ */
    function ProviderPanel({ user, t, globalReqs, setGlobalReqs, setNotifs }) {
      const [avail, setAvail] = useState(user.available !== 0);
      const [myJobs, setMyJobs] = useState([]);
      const [tab, setTab] = useState("open");
      const [otpInputs, setOtpInputs] = useState({});
      const [otpLoading, setOtpLoading] = useState({});
      const [otpError, setOtpError] = useState({});
      const [showOtpField, setShowOtpField] = useState({});
      const [decliningId, setDecliningId] = useState(null);
      const [actionLoading, setActionLoading] = useState({});
      const [loadingJobs, setLoadingJobs] = useState(true);
      const [confirmCancelJob, setConfirmCancelJob] = useState(null);
      const { toasts, err, ok } = useToast();

      const userSkills = useMemo(() => (user.skill || "").split(",").map(x => x.trim()).filter(Boolean), [user.skill]);

      // Load provider's assigned jobs from server on mount
      useEffect(() => {
        (async () => {
          setLoadingJobs(true);
          try {
            const all = await API.getRequests();
            // Merge into globalReqs
            setGlobalReqs(all);
            // My jobs = assigned to me and not pending/cancelled/declined
            const mine = all.filter(r => r.provider_id === user.id && !["Pending", "Cancelled", "Declined"].includes(r.status));
            setMyJobs(mine);
          } catch { }
          setLoadingJobs(false);
        })();
      }, [user.id]);

      const openReqs = useMemo(() => globalReqs.filter(r => {
        if (r.status !== "Pending" || r.provider_id) return false;
        return userSkills.includes(r.service_type);
      }), [globalReqs, userSkills]);

      const acceptJob = async (req) => {
        setActionLoading(p => ({ ...p, [req.id]: "accept" }));
        try {
          const updated = await API.acceptReq(req.id);
          setGlobalReqs(prev => prev.map(r => r.id === req.id ? { ...r, ...updated } : r));
          setMyJobs(p => {
            // don't duplicate
            if (p.find(j => j.id === req.id)) return p.map(j => j.id === req.id ? { ...j, ...updated } : j);
            return [...p, { ...req, ...updated }];
          });
          setNotifs(p => [{ id: Date.now(), type: "assign", icon: "✅", title: "Job Accepted", message: `Accepted: ${req.service_type}`, time: "just now", read_flag: 0 }, ...p]);
          setTab("mine");
        } catch (e) { err(e.message); }
        setActionLoading(p => ({ ...p, [req.id]: undefined }));
      };

      const declineJob = async (req) => {
        setDecliningId(req.id);
        try {
          await API.declineReq(req.id);
          setGlobalReqs(prev => prev.map(r => r.id === req.id ? { ...r, declined: true } : r));
          setNotifs(p => [{ id: Date.now(), type: "info", icon: "⏭️", title: "Job Skipped", message: `Skipped ${req.service_type} request.`, time: "just now", read_flag: 0 }, ...p]);
        } catch (e) { err(e.message); }
        setDecliningId(null);
      };

      const cancelJob = async (job) => {
        setConfirmCancelJob(job);
      };

      const doCancelJob = async () => {
        const job = confirmCancelJob;
        setConfirmCancelJob(null);
        setActionLoading(p => ({ ...p, [job.id]: "cancel" }));
        try {
          await API.cancelReq(job.id);
          setMyJobs(p => p.filter(j => j.id !== job.id));
          setGlobalReqs(prev => prev.filter(r => r.id !== job.id));
          setNotifs(p => [{ id: Date.now(), type: "info", icon: "❌", title: "Job Cancelled", message: `${job.service_type} job cancelled.`, time: "just now", read_flag: 0 }, ...p]);
          ok("Job cancelled.");
        } catch (e) { err(e.message); }
        setActionLoading(p => ({ ...p, [job.id]: undefined }));
      };

      const markOnTheWay = async (job) => {
        setActionLoading(p => ({ ...p, [job.id]: "otw" }));
        try {
          const updated = await API.updateRequest(job.id, { status: "On the way" });
          setMyJobs(p => p.map(j => j.id === job.id ? { ...j, ...updated } : j));
          setGlobalReqs(prev => prev.map(r => r.id === job.id ? { ...r, ...updated } : r));
        } catch (e) { err(e.message); }
        setActionLoading(p => ({ ...p, [job.id]: undefined }));
      };

      const updateStatus = async (jobId, newStatus) => {
        setActionLoading(p => ({ ...p, [jobId]: newStatus }));
        try {
          const updated = await API.updateRequest(jobId, { status: newStatus });
          setMyJobs(p => p.map(j => j.id === jobId ? { ...j, ...updated } : j));
          setGlobalReqs(prev => prev.map(r => r.id === jobId ? { ...r, ...updated } : r));
        } catch (e) { err(e.message); }
        setActionLoading(p => ({ ...p, [jobId]: undefined }));
      };

      const doStartWork = async (job) => {
        setActionLoading(p => ({ ...p, [job.id]: "start" }));
        try {
          const updated = await API.startWork(job.id);
          setMyJobs(p => p.map(j => j.id === job.id ? { ...j, ...updated } : j));
          setGlobalReqs(prev => prev.map(r => r.id === job.id ? { ...r, ...updated } : r));
          ok("Work started! Customer notified.");
        } catch (e) { err(e.message); }
        setActionLoading(p => ({ ...p, [job.id]: undefined }));
      };

      const submitOtp = async (jobId) => {
        const otp = (otpInputs[jobId] || "").trim();
        if (!otp) { setOtpError(p => ({ ...p, [jobId]: "Please enter the OTP from the customer." })); return; }
        setOtpLoading(p => ({ ...p, [jobId]: true })); setOtpError(p => ({ ...p, [jobId]: "" }));
        try {
          const updated = await API.completeWithOtp(jobId, otp);
          setMyJobs(p => p.map(j => j.id === jobId ? { ...j, ...updated } : j));
          setGlobalReqs(prev => prev.map(r => r.id === jobId ? { ...r, ...updated } : r));
          setNotifs(p => [{ id: Date.now(), type: "complete", icon: "✅", title: "Job Completed!", message: `${updated.service_type} job marked done.`, time: "just now", read_flag: 0 }, ...p]);
          setShowOtpField(p => ({ ...p, [jobId]: false }));
        } catch (e) { setOtpError(p => ({ ...p, [jobId]: e.message })); }
        setOtpLoading(p => ({ ...p, [jobId]: false }));
      };

      const toggleAvail = async () => {
        const newVal = !avail;
        setAvail(newVal);
        try { await API.call("/api/providers/me/availability", { method: "PUT", body: JSON.stringify({ available: newVal }) }); } catch { }
      };

      const STATUS_FLOW = [
        {
          from: "Accepted", actions: [
            { label: "🚗 On the Way", status: "On the way", col: "#3b82f6", note: "Let customer know you're heading over" },
          ]
        },
        {
          from: "On the way", actions: [
            { label: "🚶 Almost There", status: "Coming", col: "#8b5cf6", note: "Almost there" },
            { label: "🏠 Reached", status: "Reached", col: "#10b981", note: "Notify customer you've arrived" },
          ]
        },
        {
          from: "Coming", actions: [
            { label: "🏠 Reached", status: "Reached", col: "#10b981", note: "Notify customer you've arrived" },
          ]
        },
        { from: "Reached", actions: [], startWork: true },
        { from: "Arrived", actions: [], startWork: true },
        { from: "In Progress", actions: [] },
      ];

      const getFlow = (status) => STATUS_FLOW.find(s => s.from === status) || { actions: [] };

      return (
        <div className="fade-in">
          <Toast toasts={toasts} />
          {confirmCancelJob && <ConfirmModal
            msg={`Cancel this ${confirmCancelJob.service_type} job?`}
            subMsg="The request will be re-broadcast so another provider can accept it."
            confirmLabel="Yes, Cancel Job"
            onConfirm={doCancelJob}
            onCancel={() => setConfirmCancelJob(null)}
          />}
          <SH title="📋 My Jobs" sub={`${user.society || "—"} · ${userSkills.join(", ") || "—"}`} t={t} />

          {/* Availability toggle */}
          <Card t={t} style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div><p style={{ fontSize: 14, fontWeight: 700, color: t.txt, margin: 0 }}>Availability</p>
                <p style={{ fontSize: 13, color: avail ? "#10b981" : "#f87171", margin: "3px 0 0", fontWeight: 600 }}>{avail ? "🟢 Open for jobs" : "🔴 Unavailable"}</p></div>
              <div onClick={toggleAvail} style={{ width: 50, height: 26, borderRadius: 13, background: avail ? "#10b981" : t.border, position: "relative", transition: "background 0.2s", cursor: "pointer" }}>
                <div style={{ position: "absolute", top: 3, left: avail ? 25 : 3, width: 20, height: 20, borderRadius: "50%", background: "#fff", transition: "left 0.2s" }} />
              </div>
            </div>
            {userSkills.length > 0 && <div style={{ marginTop: 12, display: "flex", gap: 6, flexWrap: "wrap" }}>
              {userSkills.map(sk => (
                <span key={sk} style={{ fontSize: 11, background: (SVC_COL[sk] || "#666") + "22", color: SVC_COL[sk] || "#888", padding: "3px 10px", borderRadius: 20, fontWeight: 700 }}>{SVC_ICO[sk] || "🔧"} {sk}</span>
              ))}
            </div>}
          </Card>

          {/* Stats */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(100px,1fr))", gap: 12, marginBottom: 16 }}>
            {[
              ["📋", openReqs.length, "Open Requests"],
              ["🔨", myJobs.filter(j => j.status !== "Completed").length, "Active Jobs"],
              ["⭐", user.rating ? Number(user.rating).toFixed(1) : "—", "My Rating"],
              ["📦", user.jobs_done || 0, "Jobs Done"]
            ].map(([i, v, l]) => (
              <div key={l} style={{ background: t.card, border: `1px solid ${t.border}`, borderRadius: 14, padding: "13px 10px", textAlign: "center" }}>
                <p style={{ fontSize: 20, margin: "0 0 5px" }}>{i}</p>
                <p style={{ fontSize: 22, fontWeight: 700, color: t.txt, margin: "0 0 2px" }}>{v}</p>
                <p style={{ fontSize: 10, color: t.muted, margin: 0 }}>{l}</p>
              </div>
            ))}
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", background: "rgba(0,0,0,0.2)", borderRadius: 11, padding: 4, marginBottom: 14, gap: 4 }}>
            {[["open", `🔓 Open (${openReqs.length})`], ["mine", `🔨 My Jobs (${myJobs.filter(j => j.status !== "Completed").length})`], ["reviews", "⭐ My Reviews"]].map(([k, lbl]) => (
              <button key={k} onClick={() => setTab(k)} style={{ flex: 1, padding: "8px", borderRadius: 8, border: "none", fontSize: 11, fontWeight: 700, background: tab === k ? "linear-gradient(135deg,#334155,#4f6a82)" : "transparent", color: tab === k ? "#ffffff" : "#6b7280", cursor: "pointer" }}>{lbl}</button>
            ))}
          </div>

          {/* Open Requests Tab */}
          {tab === "open" && <Card t={t}>
            <p style={{ fontSize: 13, fontWeight: 700, color: t.txt, marginBottom: 10 }}>🏘️ Open requests in <span style={{ color: "#8B83A8" }}>{user.society}</span></p>
            {!avail && <div style={{ padding: "9px 12px", background: "rgba(239,68,68,0.07)", border: "1px solid rgba(239,68,68,0.18)", borderRadius: 9, marginBottom: 11, fontSize: 13, color: "#f87171" }}>⚠️ Turn on availability to accept jobs.</div>}
            {loadingJobs ? <div style={{ textAlign: "center", padding: "28px 0", color: t.muted }}>Loading…</div>
              : openReqs.length === 0
                ? <div style={{ textAlign: "center", padding: "28px 0", color: t.muted }}><p style={{ fontSize: 26, marginBottom: 8 }}>✅</p><p>No open requests matching your skills right now</p></div>
                : openReqs.map(r => (
                  <div key={r.id} style={{ padding: 13, background: t.hov, borderRadius: 11, marginBottom: 9, border: `1px solid ${r.emergency ? "rgba(239,68,68,0.28)" : t.border}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <div>
                        <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 2 }}>
                          <span style={{ fontSize: 18 }}>{SVC_ICO[r.service_type] || "🔧"}</span>
                          <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, margin: 0 }}>{r.service_type} {r.emergency ? "⚡" : ""}</p>
                        </div>
                        <p style={{ fontSize: 12, color: t.muted, margin: "0 0 3px" }}>👤 {r.customer_name || "Resident"} {r.flat ? `· Flat ${r.flat}` : ""}</p>
                        <p style={{ fontSize: 12, color: t.muted, margin: "2px 0 0" }}>{r.created_at}</p>
                      </div>
                      <Badge s={r.status} />
                    </div>
                    <p style={{ fontSize: 13, color: t.txt, margin: "0 0 9px", background: t.card, padding: "8px 10px", borderRadius: 8, lineHeight: 1.5 }}>{r.description}</p>
                    {r.image_data && <div style={{ marginBottom: 9 }}>
                      <img src={r.image_data} alt="issue" style={{ width: "100%", maxHeight: 150, objectFit: "cover", borderRadius: 10, border: `1px solid ${t.border}` }} />
                    </div>}
                    <p style={{ fontSize: 12, color: "#8B83A8", margin: "0 0 9px", fontWeight: 600 }}>💰 {r.cost || "TBD"}</p>
                    <div style={{ display: "flex", gap: 8 }}>
                      {avail
                        ? <Btn sz="sm" v="ok" onClick={() => acceptJob(r)} disabled={actionLoading[r.id] === "accept"}>
                          {actionLoading[r.id] === "accept" ? "Accepting…" : "✓ Accept Job"}
                        </Btn>
                        : <Btn sz="sm" v="ghost" disabled>Enable availability first</Btn>}
                      <Btn sz="sm" v="bad" onClick={() => declineJob(r)} disabled={decliningId === r.id}>
                        {decliningId === r.id ? "…" : "✕ Skip"}
                      </Btn>
                    </div>
                  </div>
                ))
            }
          </Card>}

          {/* My Jobs Tab */}
          {tab === "mine" && <Card t={t}>
            {loadingJobs ? <div style={{ textAlign: "center", padding: "28px 0", color: t.muted }}>Loading your jobs…</div>
              : myJobs.filter(j => j.status !== "Completed").length === 0
                ? <div style={{ textAlign: "center", padding: "28px 0", color: t.muted }}><p style={{ fontSize: 26, marginBottom: 8 }}>📋</p><p>No active jobs — accept one from Open Requests</p></div>
                : myJobs.filter(j => j.status !== "Completed").map(j => {
                  const flow = getFlow(j.status);
                  const al = actionLoading[j.id];
                  const canCancel = !["In Progress", "Completed", "Cancelled"].includes(j.status);
                  return (
                    <div key={j.id} style={{ padding: 14, background: t.hov, borderRadius: 12, marginBottom: 10, border: `1px solid ${t.border}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                        <div>
                          <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 3 }}>
                            <span style={{ fontSize: 18 }}>{SVC_ICO[j.service_type] || "🔧"}</span>
                            <p style={{ fontSize: 14, fontWeight: 700, color: t.txt, margin: 0 }}>{j.service_type}</p>
                          </div>
                          <p style={{ fontSize: 12, color: t.muted, margin: 0 }}>👤 {j.customer_name || "Resident"} {j.flat ? `· Flat ${j.flat}` : ""}</p>
                        </div>
                        <Badge s={j.status} />
                      </div>
                      <p style={{ fontSize: 13, color: t.muted, margin: "0 0 10px", lineHeight: 1.5 }}>{j.description}</p>

                      {/* Status action buttons */}
                      {flow.actions.length > 0 && <>
                        <p style={{ fontSize: 11, color: t.muted, marginBottom: 6, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px" }}>📍 Update Your Status</p>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 10 }}>
                          {flow.actions.map(a => (
                            <button key={a.status} onClick={() => updateStatus(j.id, a.status)} disabled={!!al}
                              title={a.note}
                              style={{ padding: "7px 14px", borderRadius: 20, border: `1px solid ${a.col}55`, background: a.col + "18", color: a.col, fontSize: 12, fontWeight: 700, opacity: al ? 0.6 : 1 }}>
                              {al === a.status ? "Updating…" : a.label}
                            </button>
                          ))}
                        </div>
                      </>}

                      {/* Start Work button — shown when reached */}
                      {flow.startWork && <>
                        <p style={{ fontSize: 11, color: t.muted, marginBottom: 6, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px" }}>🚀 Ready to Begin?</p>
                        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                          <Btn sz="sm" v="ok" onClick={() => doStartWork(j)} disabled={al === "start"}>
                            {al === "start" ? "Starting…" : "⚙️ Start Work"}
                          </Btn>
                        </div>
                      </>}

                      {/* OTP Completion */}
                      {j.status === "In Progress" && <>
                        <div style={{ background: "rgba(245,158,11,0.06)", border: "1px solid rgba(139,131,168,0.2)", borderRadius: 10, padding: "11px 13px", marginTop: 4, marginBottom: 10 }}>

                          <p style={{ fontSize: 12, color: t.muted, margin: "0 0 9px", lineHeight: 1.5 }}>Ask the customer to generate an OTP from their app and enter it below to mark the job as done.</p>
                          {!showOtpField[j.id]
                            ? <Btn sz="sm" onClick={() => setShowOtpField(p => ({ ...p, [j.id]: true }))}>Enter Completion OTP</Btn>
                            : <div>
                              <div style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                                <input
                                  value={otpInputs[j.id] || ""}
                                  onChange={e => setOtpInputs(p => ({ ...p, [j.id]: e.target.value.replace(/\D/g, "").slice(0, 6) }))}
                                  placeholder="6-digit OTP"
                                  maxLength={6}
                                  style={{ flex: 1, padding: "9px 13px", borderRadius: 9, border: `1px solid ${otpError[j.id] ? "#ef4444" : "rgba(139,131,168,0.4)"}`, background: t.inp, color: t.txt, fontSize: 16, fontWeight: 700, letterSpacing: 4, textAlign: "center", fontFamily: "monospace" }} />
                                <Btn v="ok" onClick={() => submitOtp(j.id)} disabled={otpLoading[j.id] || (otpInputs[j.id] || "").length !== 6}>
                                  {otpLoading[j.id] ? "…" : "✓ Submit"}
                                </Btn>
                              </div>
                              {otpError[j.id] && <p style={{ fontSize: 12, color: "#f87171", margin: 0 }}>{otpError[j.id]}</p>}
                              <button onClick={() => setShowOtpField(p => ({ ...p, [j.id]: false }))} style={{ background: "none", border: "none", color: t.muted, fontSize: 12, marginTop: 4, padding: 0 }}>Hide OTP field</button>
                            </div>}
                        </div>
                      </>}

                      {/* Cancel Job */}
                      {canCancel && <div style={{ borderTop: `1px solid ${t.border}`, marginTop: 6, paddingTop: 10 }}>
                        <Btn sz="sm" v="bad" onClick={() => cancelJob(j)} disabled={al === "cancel"}>
                          {al === "cancel" ? "Cancelling…" : "✕ Cancel Job"}
                        </Btn>
                      </div>}
                    </div>
                  );
                })
            }
          </Card>}

          {/* Reviews Tab */}
          {tab === "reviews" && <ProviderReviewsTab user={user} t={t} />}
        </div>
      );
    }

    /* ══════════════════════════════════════
       PROVIDER REVIEWS TAB
    ══════════════════════════════════════ */
    function ProviderReviewsTab({ user, t }) {
      const [reviews, setReviews] = useState([]);
      const [loading, setLoading] = useState(true);
      const [avgRating, setAvgRating] = useState(0);

      useEffect(() => {
        (async () => {
          setLoading(true);
          try {
            const data = await API.getProviderReviews(user.id);
            setReviews(data.reviews || []);
            setAvgRating(data.avg_rating || 0);
          } catch { }
          setLoading(false);
        })();
      }, [user.id]);

      const renderStars = (n, size = 14) => (
        <span>
          {[1, 2, 3, 4, 5].map(i => (
            <span key={i} style={{ color: i <= Math.round(n) ? "#8B83A8" : "rgba(255,255,255,0.14)", fontSize: size }}>★</span>
          ))}
        </span>
      );

      if (loading) return <Card t={t}><div style={{ textAlign: "center", padding: 40, color: t.muted }}>Loading reviews…</div></Card>;

      return (
        <Card t={t}>
          {/* Summary bar */}
          {reviews.length > 0 && <div style={{ display: "flex", alignItems: "center", gap: 16, padding: "14px 16px", background: "rgba(245,158,11,0.06)", border: "1px solid rgba(245,158,11,0.18)", borderRadius: 12, marginBottom: 16 }}>
            <div style={{ textAlign: "center" }}>
              <p style={{ fontSize: 38, fontWeight: 900, color: "#8B83A8", margin: 0, lineHeight: 1 }}>{avgRating.toFixed(1)}</p>
              <div style={{ marginTop: 4 }}>{renderStars(avgRating, 16)}</div>
              <p style={{ fontSize: 11, color: t.muted, margin: "4px 0 0" }}>{reviews.length} review{reviews.length !== 1 ? "s" : ""}</p>
            </div>
            <div style={{ flex: 1 }}>
              {[5, 4, 3, 2, 1].map(star => {
                const count = reviews.filter(r => r.rating === star).length;
                const pct = reviews.length ? Math.round(count / reviews.length * 100) : 0;
                return (
                  <div key={star} style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 4 }}>
                    <span style={{ fontSize: 11, color: "#8B83A8", width: 10, textAlign: "right", fontWeight: 700 }}>{star}</span>
                    <span style={{ fontSize: 10 }}>★</span>
                    <div style={{ flex: 1, height: 6, background: "rgba(255,255,255,0.07)", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: "#8B83A8", borderRadius: 3, transition: "width 0.5s" }} />
                    </div>
                    <span style={{ fontSize: 10, color: t.muted, width: 28, textAlign: "right" }}>{count}</span>
                  </div>
                );
              })}
            </div>
          </div>}

          {reviews.length === 0 && <div style={{ textAlign: "center", padding: "36px 0", color: t.muted }}>
            <p style={{ fontSize: 32, marginBottom: 10 }}>⭐</p>
            <p style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>No reviews yet</p>
            <p style={{ fontSize: 13 }}>Complete jobs to start receiving ratings from customers</p>
          </div>}

          {reviews.map(r => (
            <div key={r.id} style={{ padding: "12px 14px", background: t.hov, borderRadius: 11, marginBottom: 9, border: `1px solid ${t.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <Av s={r.customer_name || "C"} sz={30} col="#6b7280" />
                  <div>
                    <p style={{ fontSize: 13, fontWeight: 700, color: t.txt, margin: 0 }}>{r.customer_name || "Customer"}</p>
                    <p style={{ fontSize: 10, color: t.muted, margin: "1px 0 0" }}>{r.created_at}</p>
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  {renderStars(r.rating, 15)}
                  <p style={{ fontSize: 10, color: "#8B83A8", margin: "2px 0 0", fontWeight: 700 }}>{r.rating}/5</p>
                </div>
              </div>
              {r.comment && <p style={{ fontSize: 13, color: t.muted, margin: 0, lineHeight: 1.55, padding: "8px 10px", background: t.card, borderRadius: 8, borderLeft: "3px solid rgba(245,158,11,0.3)" }}>{r.comment}</p>}
            </div>
          ))}
        </Card>
      );
    }
